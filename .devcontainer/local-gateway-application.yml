# Verbose logs: podman logs -f zms-refarch-gateway
# CORS is mostly enforced in the browser; gateway still logs each request (incl. OPTIONS preflight).
logging:
  level:
    root: INFO
    org.springframework.cloud.gateway: DEBUG
    org.springframework.cloud.gateway.handler: DEBUG
    org.springframework.cloud.gateway.filter: DEBUG
    org.springframework.web.cors: DEBUG
    org.springframework.web.cors.reactive: DEBUG
    org.springframework.web.server.adapter: DEBUG
    reactor.netty.http.server: DEBUG

spring:
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns:
              - "http://localhost:*"
              - "https://localhost:*"
              - "http://citizenview:*"
              - "https://citizenview:*"
            allowedMethods:
              - '*'
            allowedHeaders:
              - '*'
      routes:
        - id: "citizen-api"
          uri: "http://zms-web:80"
          predicates:
            - Path=/buergeransicht/api/citizen/**
          filters:
            - RewritePath=/buergeransicht/api/citizen/(?<segment>.*), /terminvereinbarung/api/citizen/${segment}
            - RemoveResponseHeader=WWW-Authenticate
        - id: "webcomponent"
          uri: "${WEBCOMPONENT_URI}"
          predicates:
            - Path=/buergeransicht/**
          filters:
            - RewritePath=/buergeransicht/(?<segment>.*), /${segment}
            - RemoveResponseHeader=WWW-Authenticate
