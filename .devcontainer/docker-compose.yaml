services:
  # zmsbase uses per-arch tags. devcontainer initializeCommand runs
  # .devcontainer/scripts/sync-php-base-tag.sh (see devcontainer.json) sets ZMS_PHP_BASE_TAG from host uname.
  # Fallback default is amd64 for plain `docker compose` without that step.
  web:
    container_name: zms-web
    image: ghcr.io/it-at-m/eappointment/zmsbase:${ZMS_PHP_BASE_TAG:-8.3-local-amd64}
    volumes:
      - ..:/var/www/html:cached,z
      - ./php/xdebug.ini:/usr/local/etc/php/conf.d/99-xdebug.ini:ro,z
    ports:
      - "8090:80"
    env_file:
      - .env
    depends_on:
      - db
      - keycloak
    networks:
      - default

  mail-viewer:
    image: node:24
    container_name: zms-mail-viewer
    working_dir: /workspace/.devcontainer/mail-viewer
    volumes:
      - ..:/workspace:cached,z
    command: sh -c "npm install && npm start"
    ports:
      - "8025:8025"
    environment:
      - PORT=8025
      - ZMS_API_URL=http://web/terminvereinbarung/api/2
      - ZMS_MAIL_VIEWER_API_USER=${ZMS_MAIL_VIEWER_API_USER:-superuser}
      - ZMS_MAIL_VIEWER_API_PASSWORD=${ZMS_MAIL_VIEWER_API_PASSWORD:-vorschau}
      - ZMS_MAIL_VIEWER_USER=${ZMS_MAIL_VIEWER_USER:-superuser}
      - ZMS_MAIL_VIEWER_PASSWORD=${ZMS_MAIL_VIEWER_PASSWORD:-vorschau}
    env_file:
      - .env
    depends_on:
      - web
    networks:
      - default
    restart: unless-stopped

  citizenview:
    image: node:24
    container_name: zms-citizenview
    working_dir: /workspace/zmscitizenview
    volumes:
      - ..:/workspace:cached,z
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 8082"
    ports:
      - "8082:8082"
    depends_on:
      - web
    networks:
      - default
    restart: unless-stopped

  db:
    image: mariadb:10.11
    container_name: zms-db
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - db-data:/var/lib/mysql
      - ../.resources/zms.sql:/docker-entrypoint-initdb.d/01-zms.sql:ro,z
    ports:
      - "3306:3306"

  phpmyadmin:
    image: phpmyadmin:5
    container_name: zms-phpmyadmin
    restart: unless-stopped
    ports:
      - "8036:80"
    environment:
      - PMA_USER=root
      - PMA_PASSWORD=root
      - PMA_HOST=zms-db
      - PMA_PORT=3306
      - UPLOAD_LIMIT=25600M
    depends_on:
      - db

  refarch-gateway:
    image: ghcr.io/it-at-m/refarch/refarch-gateway:1.8.1
    container_name: zms-refarch-gateway
    ports:
      - "8084:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=no-security
      - WEBCOMPONENT_URI=http://localhost:8080
    volumes:
      - ./local-gateway-application.yml:/deployments/application.yml:ro,z
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.4@sha256:20e96e40e673ffa474ac4da56c91cb0adba28b8571bd274ce255e6120265c1f4
    container_name: zms-keycloak
    hostname: keycloak
    command:
      - start-dev
    environment:
      - KC_BOOTSTRAP_ADMIN_USERNAME=admin
      - KC_BOOTSTRAP_ADMIN_PASSWORD=admin
      - KC_HEALTH_ENABLED=true
      - KC_HTTP_PORT=8080
      - KC_HTTP_RELATIVE_PATH=/auth
      - KC_DB=dev-file
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak/plugins:/opt/keycloak/providers/:z
    networks:
      default:
        aliases:
          - keycloak
    restart: unless-stopped

  init-keycloak:
    image: klg71/keycloakmigration:0.2.129@sha256:356bb15df86d6476f1469789718f597ac70583f83c2ae9c90408a3e00e3a1796
    container_name: zms-init-keycloak
    depends_on:
      keycloak:
        condition: service_started
    environment:
      - ADMIN_USER=admin
      - ADMIN_PASSWORD=admin
      - BASEURL=http://keycloak:8080/auth
      - WAIT_FOR_KEYCLOAK=true
      - FAIL_ON_UNDEFINED_VARIABLES=true
      - KEYCLOAK_CHANGELOG=/migration/keycloak-changelog.yml
    volumes:
      - ../.resources/keycloak/migration:/migration:z
    networks:
      - default
    restart: "no"

volumes:
  db-data:
