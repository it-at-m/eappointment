services:
  web:
    container_name: zms-web
    image: ghcr.io/it-at-m/eappointment-php-base:8.3-local
    pull_policy: always
    environment:
      # Plain Olson id; POSIX ":Europe/Berlin" has tripped ICU/mod_php in some setups
      TZ: Europe/Berlin
      # LC_ALL from .env (e.g. LC_ALL=C) overrides LANG alone and breaks ICU Olson zones under mod_php
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
    volumes:
      - ..:/var/www/html:cached,z
      - ./php/xdebug.ini:/usr/local/etc/php/conf.d/99-xdebug.ini:ro,z
    ports:
      - "8090:80"
    env_file:
      - .env
    depends_on:
      - db
      - keycloak
    networks:
      - default

  citizenview:
    image: node:22
    container_name: zms-citizenview
    working_dir: /workspace/zmscitizenview
    volumes:
      - ..:/workspace:cached,z
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 8082"
    ports:
      - "8082:8082"
    depends_on:
      - web
    networks:
      - default
    restart: unless-stopped

  db:
    image: mariadb:10.11
    container_name: zms-db
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - db-data:/var/lib/mysql
      - ../.resources/zms.sql:/docker-entrypoint-initdb.d/01-zms.sql:ro,z
    ports:
      - "3306:3306"

  phpmyadmin:
    image: phpmyadmin:5
    container_name: zms-phpmyadmin
    restart: unless-stopped
    ports:
      - "8036:80"
    environment:
      - PMA_USER=root
      - PMA_PASSWORD=root
      - PMA_HOST=zms-db
      - PMA_PORT=3306
      - UPLOAD_LIMIT=25600M
    depends_on:
      - db

  refarch-gateway:
    image: ghcr.io/it-at-m/refarch/refarch-gateway:1.7.0
    container_name: zms-refarch-gateway
    ports:
      - "8084:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=no-security
      - WEBCOMPONENT_URI=http://localhost:8080
    volumes:
      - ./local-gateway-application.yml:/deployments/application.yml:ro,z
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:26.5.3@sha256:5a236ae4dd8ece77490115bace15a11a4d15e9cbcf58a490b95a7da2cd71d32a
    container_name: zms-keycloak
    hostname: keycloak
    command:
      - start-dev
    environment:
      - KC_BOOTSTRAP_ADMIN_USERNAME=admin
      - KC_BOOTSTRAP_ADMIN_PASSWORD=admin
      - KC_HEALTH_ENABLED=true
      - KC_HTTP_PORT=8080
      - KC_HTTP_RELATIVE_PATH=/auth
      - KC_DB=dev-file
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak/plugins:/opt/keycloak/providers/:z
    networks:
      default:
        aliases:
          - keycloak
    restart: unless-stopped

  init-keycloak:
    image: klg71/keycloakmigration:0.2.125@sha256:a326d3e50e2a35b70a3cf3a5d33288af9bcba27fef89146a2107622583e34231
    container_name: zms-init-keycloak
    depends_on:
      keycloak:
        condition: service_started
    environment:
      - ADMIN_USER=admin
      - ADMIN_PASSWORD=admin
      - BASEURL=http://keycloak:8080/auth
      - WAIT_FOR_KEYCLOAK=true
      - FAIL_ON_UNDEFINED_VARIABLES=true
      - KEYCLOAK_CHANGELOG=/migration/keycloak-changelog.yml
    volumes:
      - ../.resources/keycloak/migration:/migration:z
    networks:
      - default
    restart: "no"

volumes:
  db-data:
