name: Psalm Security Scan

on:
  workflow_dispatch:
  push:
    branches: [ "main", "next" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '24 5 * * 3'

permissions:
  contents: read
  security-events: write

jobs:
  psalm:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        project:
          - mellon
          - zmsadmin
          - zmsapi
          - zmscalldisplay
          - zmscitizenapi
          - zmsclient
          - zmsdb
          - zmsdldb
          - zmsentities
          - zmsmessaging
          - zmsslim
          - zmsstatistic
          - zmsticketprinter

    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
          tools: composer
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
        working-directory: ${{ matrix.project }}

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ matrix.project }}-${{ hashFiles(format('{0}/composer.lock', matrix.project)) }}
          restore-keys: |
            ${{ runner.os }}-composer-${{ matrix.project }}-

      - name: Install dependencies
        working-directory: ${{ matrix.project }}
        run: composer install --no-progress --prefer-dist --no-interaction

      - name: Run Psalm Security Scan
        id: psalm
        continue-on-error: true
        working-directory: ${{ matrix.project }}
        run: |
          vendor/bin/psalm \
            --no-progress \
            --report=../results-${{ matrix.project }}.sarif

      - name: Normalize SARIF paths to repository root
        env:
          PROJECT: ${{ matrix.project }}
        run: |
          python - <<'PY'
          import os
          import json

          project = os.environ["PROJECT"]
          sarif_path = f"results-{project}.sarif"

          with open(sarif_path, "r", encoding="utf-8") as file:
              sarif = json.load(file)

          for run in sarif.get("runs", []):
              for result in run.get("results", []):
                  for location in result.get("locations", []):
                      artifact = (
                          location.get("physicalLocation", {})
                          .get("artifactLocation", {})
                      )
                      uri = artifact.get("uri")
                      if isinstance(uri, str) and not uri.startswith(f"{project}/"):
                          artifact["uri"] = f"{project}/{uri}"

          with open(sarif_path, "w", encoding="utf-8") as file:
              json.dump(sarif, file)
          PY

      - name: Upload SARIF results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results-${{ matrix.project }}.sarif
          checkout_path: ${{ matrix.project }}

      - name: Fail job if Psalm found issues
        if: steps.psalm.outcome == 'failure'
        run: exit 1
