name: 🛡️ 🐘 Psalm PHP Security Scan

on:
  workflow_dispatch:
    inputs:
      run_dead_code:
        description: "Run monorepo dead-code scan"
        required: false
        default: true
        type: boolean
  # Scheduled on main only until ~18k Psalm findings are cleared (PR/push would fail every CI).
  # Re-enable pull_request / push when errorLevel is stricter or debt is baselined.
  # GitHub Actions cron is UTC; runs on the default branch (main) only.
  schedule:
    - cron: '0 4 * * *' # 06:00 Europe/Berlin (CEST) / 05:00 (CET)

permissions:
  contents: read
  pull-requests: read
  security-events: write

concurrency:
  group: psalm-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: ${{ github.event_name != 'schedule' }}

jobs:
  psalm:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.ref == 'refs/heads/main'

    strategy:
      fail-fast: false
      matrix:
        project:
          - mellon
          - zmsadmin
          - zmsbackend
          - zmscalldisplay
          - zmscitizenapi
          - zmsclient
          - zmsdldb
          - zmsentities
          - zmsmessaging
          - zmsslim
          - zmsstatistic
          - zmsticketprinter

    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v7
        with:
          submodules: true

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
          tools: composer
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
        working-directory: ${{ matrix.project }}

      - name: Cache Composer dependencies
        uses: actions/cache@v6
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ matrix.project }}-${{ hashFiles(format('{0}/composer.lock', matrix.project)) }}
          restore-keys: |
            ${{ runner.os }}-composer-${{ matrix.project }}-

      - name: Install dependencies
        working-directory: ${{ matrix.project }}
        run: composer install --no-progress --prefer-dist --no-interaction

      - name: Run Psalm Security Scan
        id: psalm
        continue-on-error: true
        working-directory: ${{ matrix.project }}
        run: |
          set +e
          vendor/bin/psalm \
            --no-progress \
            --report=../results-${{ matrix.project }}.sarif
          psalm_exit=$?
          set -e
          echo "exit_code=${psalm_exit}" >> "$GITHUB_OUTPUT"
          if [ ! -f "../results-${{ matrix.project }}.sarif" ]; then
            echo "Psalm did not produce SARIF for ${{ matrix.project }} (exit code: ${psalm_exit})."
            exit 1
          fi
          if [ "${psalm_exit}" -ne 0 ]; then
            echo "Psalm reported issues for ${{ matrix.project }} (exit code: ${psalm_exit})."
            exit "${psalm_exit}"
          fi

      - name: Normalize SARIF paths to repository root
        env:
          PROJECT: ${{ matrix.project }}
        run: |
          python - <<'PY'
          import os
          import json

          project = os.environ["PROJECT"]
          sarif_path = f"results-{project}.sarif"

          with open(sarif_path, "r", encoding="utf-8") as file:
              sarif = json.load(file)

          for run in sarif.get("runs", []):
              for result in run.get("results", []):
                  for location in result.get("locations", []):
                      artifact = (
                          location.get("physicalLocation", {})
                          .get("artifactLocation", {})
                      )
                      uri = artifact.get("uri")
                      if isinstance(uri, str) and not uri.startswith(f"{project}/"):
                          artifact["uri"] = f"{project}/{uri}"

          with open(sarif_path, "w", encoding="utf-8") as file:
              json.dump(sarif, file)
          PY

      - name: Check SARIF file exists
        id: sarif
        run: |
          if [ -f "results-${{ matrix.project }}.sarif" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload SARIF results
        if: always() && steps.sarif.outputs.exists == 'true'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results-${{ matrix.project }}.sarif
          checkout_path: ${{ matrix.project }}

      - name: Fail job if Psalm scan or SARIF generation failed
        if: always()
        run: |
          if [ "${{ steps.sarif.outputs.exists }}" != "true" ]; then
            echo "Missing SARIF output for ${{ matrix.project }} (results-${{ matrix.project }}.sarif)."
            exit 1
          fi
          psalm_exit="${{ steps.psalm.outputs.exit_code }}"
          if [ -z "${psalm_exit}" ] || [ "${psalm_exit}" != "0" ]; then
            echo "Psalm failed for ${{ matrix.project }} (exit code: ${psalm_exit:-unknown})."
            exit 1
          fi

  psalm-dead-code:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'schedule' ||
      (github.ref == 'refs/heads/main' && github.event_name == 'workflow_dispatch' && inputs.run_dead_code == true)

    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v7
        with:
          submodules: true

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
          tools: composer
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache-monorepo
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
        working-directory: zmsbackend

      - name: Cache Composer dependencies
        uses: actions/cache@v6
        with:
          path: ${{ steps.composer-cache-monorepo.outputs.dir }}
          key: ${{ runner.os }}-composer-psalm-monorepo-${{ hashFiles('mellon/composer.lock', 'zmsadmin/composer.lock', 'zmsbackend/composer.lock', 'zmscalldisplay/composer.lock', 'zmscitizenapi/composer.lock', 'zmsclient/composer.lock', 'zmsdldb/composer.lock', 'zmsentities/composer.lock', 'zmsmessaging/composer.lock', 'zmsslim/composer.lock', 'zmsstatistic/composer.lock', 'zmsticketprinter/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-psalm-monorepo-

      - name: Install dependencies (all monorepo modules)
        run: |
          for project in mellon zmsadmin zmsbackend zmscalldisplay zmscitizenapi zmsclient zmsdldb zmsentities zmsmessaging zmsslim zmsstatistic zmsticketprinter; do
            echo "Installing ${project}..."
            composer install --no-progress --prefer-dist --no-interaction --working-dir="${project}"
          done

      - name: Run Psalm dead-code scan (monorepo)
        id: psalm_dead_code
        continue-on-error: true
        run: |
          set +e
          zmsbackend/vendor/bin/psalm \
            -c psalm.monorepo.xml \
            --no-progress \
            --no-cache \
            --report=results-monorepo.sarif
          psalm_exit=$?
          set -e
          echo "exit_code=${psalm_exit}" >> "$GITHUB_OUTPUT"
          if [ ! -f "results-monorepo.sarif" ]; then
            echo "Psalm did not produce monorepo SARIF (exit code: ${psalm_exit})."
            exit 1
          fi
          if [ "${psalm_exit}" -ne 0 ]; then
            echo "Psalm monorepo scan reported issues (exit code: ${psalm_exit}); SARIF will still be uploaded."
          fi

      - name: Normalize monorepo SARIF for Code Scanning
        run: |
          python - <<'PY'
          import json

          sarif_path = "results-monorepo.sarif"
          with open(sarif_path, "r", encoding="utf-8") as file:
              sarif = json.load(file)

          fixed_regions = 0
          for run in sarif.get("runs", []):
              for result in run.get("results", []):
                  for location in result.get("locations", []):
                      region = (
                          location.get("physicalLocation", {})
                          .get("region")
                      )
                      if not isinstance(region, dict):
                          continue
                      for key in ("startLine", "startColumn", "endLine", "endColumn"):
                          value = region.get(key)
                          if not isinstance(value, int) or value < 1:
                              region[key] = 1
                              fixed_regions += 1

          with open(sarif_path, "w", encoding="utf-8") as file:
              json.dump(sarif, file)

          print(f"Normalized {fixed_regions} invalid SARIF region value(s).")
          PY

      - name: Check monorepo SARIF file exists
        id: sarif_monorepo
        run: |
          if [ -f "results-monorepo.sarif" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload monorepo SARIF results
        if: always() && steps.sarif_monorepo.outputs.exists == 'true'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results-monorepo.sarif
          category: .github/workflows/psalm.yml:psalm-dead-code

      - name: Fail job if monorepo Psalm scan or SARIF generation failed
        if: always()
        run: |
          if [ "${{ steps.sarif_monorepo.outputs.exists }}" != "true" ]; then
            echo "Missing monorepo SARIF output (results-monorepo.sarif)."
            exit 1
          fi
          psalm_exit="${{ steps.psalm_dead_code.outputs.exit_code }}"
          if [ -z "${psalm_exit}" ] || [ "${psalm_exit}" != "0" ]; then
            echo "Psalm monorepo scan failed (exit code: ${psalm_exit:-unknown})."
            exit 1
          fi
