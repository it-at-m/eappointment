name: Psalm Security Scan

on:
  push:
    branches: [ "main", "next" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '24 5 * * 3'

permissions:
  contents: read
  security-events: write

jobs:
  psalm:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        project: [zmscitizenapi]

    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
          tools: composer
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
        working-directory: ${{ matrix.project }}

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ matrix.project }}-${{ hashFiles(format('{0}/composer.lock', matrix.project)) }}
          restore-keys: |
            ${{ runner.os }}-composer-${{ matrix.project }}-

      - name: Install dependencies
        working-directory: ${{ matrix.project }}
        run: composer install --no-progress --prefer-dist --no-interaction

      - name: Run Psalm Security Scan
        working-directory: ${{ matrix.project }}
        run: |
          vendor/bin/psalm \
            --no-progress \
            --output-format=sarif \
            --output-file=../results-${{ matrix.project }}.sarif

      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results-${{ matrix.project }}.sarif
