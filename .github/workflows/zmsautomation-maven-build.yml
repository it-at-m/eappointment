name: ☕ zmsautomation-maven-build

on:
  pull_request:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      TZ: Europe/Berlin
    steps:
      - uses: it-at-m/lhm_actions/action-templates/actions/action-checkout@b088b94cad35e50b197104c9e2ac8fb25a7116b3 # v1.0.33
      - uses: it-at-m/lhm_actions/action-templates/actions/action-maven-build@b088b94cad35e50b197104c9e2ac8fb25a7116b3 # v1.0.33
        with:
          app-path: zmsautomation
          java-version: "21"

