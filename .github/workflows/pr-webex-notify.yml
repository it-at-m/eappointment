name: 📣 Notify Webex on new PR

on:
  pull_request:
    types: [opened]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Notify Webex
        env:
          WEBEX_WEBHOOK_URL: ${{ secrets.WEBEX_WEBHOOK_URL }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_BASE: ${{ github.event.pull_request.base.ref }}
          PR_HEAD: ${{ github.event.pull_request.head.ref }}
        run: |
          jq -n \
            --arg repo "${{ github.repository }}" \
            --arg number "$PR_NUMBER" \
            --arg title "$PR_TITLE" \
            --arg author "$PR_AUTHOR" \
            --arg head "$PR_HEAD" \
            --arg base "$PR_BASE" \
            --arg url "$PR_URL" \
            '{markdown: ("**New pull request opened in " + $repo + "**\n\n**#" + $number + ":** " + $title + "\n\n**Author:** " + $author + "\n**Branch:** `" + $head + "` → `" + $base + "`\n\n[View pull request](" + $url + ")")}' \
            | curl -fsS -X POST -H "Content-Type: application/json" -d @- "$WEBEX_WEBHOOK_URL"
