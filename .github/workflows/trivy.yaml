name: 🛡️ Trivy Security Check

on:
  pull_request:
  workflow_call:
  push:
    branches:
      - main
      - next
  schedule:
    - cron: "0 6 * * *"

jobs:
  build:
    name: 🛡️ Trivy Security Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Run Trivy Security check on Repository
        uses: it-at-m/lhm_actions/action-templates/actions/action-trivy@b088b94cad35e50b197104c9e2ac8fb25a7116b3 # v1.0.33