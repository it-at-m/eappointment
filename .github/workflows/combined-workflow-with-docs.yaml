name: Combined Workflow with Documentation

on:
  push:
    branches: [next]
  workflow_dispatch:
    inputs:
      runZmsautomation:
        description: "Run zmsautomation jobs after assembling zms image"
        type: boolean
        required: true
        default: false
      assembleZmsImage:
        description: "Assemble and push ghcr.io/<repo>/zms:<tag> from module images (slow)"
        type: boolean
        required: true
        default: false
      browser:
        description: "Browser for UI tests (chrome|firefox)"
        type: string
        required: true
        default: "chrome"
      customTags:
        description: "Optional: run custom tag expression in addition to module matrix (leave empty to skip custom job)"
        type: string
        required: false
        default: ""

permissions:
  contents: read
  packages: write
  pages: write
  id-token: write
  actions: write

jobs:
  call-php-code-quality:
    uses: ./.github/workflows/php-code-quality.yaml

  call-php-unit-tests:
    uses: ./.github/workflows/php-unit-tests.yaml

  call-zmscitizenview-build:
    needs: [call-php-unit-tests]
    uses: ./.github/workflows/maven-node-build.yaml

  call-zmscitizenview-coverage:
    uses: ./.github/workflows/zmscitizenview-coverage.yaml

  call-owasp-security-checks:
    uses: ./.github/workflows/owasp-security-checks.yaml

  aggregate-reports:
    needs: [call-php-unit-tests, call-zmscitizenview-coverage, call-owasp-security-checks]
    runs-on: ubuntu-latest
    steps:
      - name: Create directories
        run: |
          mkdir -p public/coverage
          mkdir -p public/security

      - name: Download coverage reports
        uses: actions/download-artifact@v7
        with:
          pattern: 'coverage-*'
          path: public/coverage-temp
          merge-multiple: false

      - name: Download security reports
        uses: actions/download-artifact@v7
        with:
          pattern: 'security-report-*'
          path: public/security-temp
          merge-multiple: false

      - name: Fix directory structure
        run: |
          MODULES="zmsadmin zmscalldisplay zmscitizenapi zmsdldb zmsentities zmsmessaging zmsslim zmsstatistic zmsticketprinter zmsapi zmsdb zmsclient zmscitizenview"
          # Fix coverage reports
          for module in $MODULES; do
            if [ -d "public/coverage-temp/coverage-$module" ]; then
              mkdir -p "public/coverage/coverage-$module"
              mv "public/coverage-temp/coverage-$module"/* "public/coverage/coverage-$module/"
            fi
          done
          rm -rf public/coverage-temp

          # Fix security reports
          for module in $MODULES; do
            if [ -f "public/security-temp/security-report-$module/dependency-check-report.html" ]; then
              mkdir -p "public/security/security-report-$module"
              mv "public/security-temp/security-report-$module/dependency-check-report.html" "public/security/security-report-$module/"
            fi
          done
          rm -rf public/security-temp

      - name: Debug - List final structure
        run: |
          echo "=== Final Coverage Structure ==="
          ls -R public/coverage/
          echo "=== Final Security Structure ==="
          ls -R public/security/

      - name: Upload aggregated reports
        uses: actions/upload-artifact@v6
        with:
          name: aggregated-reports
          path: public/
          retention-days: 7

  call-build-api-docs:
    uses: ./.github/workflows/build-api-docs.yaml

  generate-schema-diagrams:
    uses: ./.github/workflows/generate-api-class-diagrams-from-zmsentities-schema.yaml

  generate-database-schema:
    uses: ./.github/workflows/generate-database-er-model.yaml

  deploy-to-pages:
    needs: [aggregate-reports, call-build-api-docs, generate-schema-diagrams, generate-database-schema]
    if: |
      needs.call-build-api-docs.result == 'success' &&
      needs.aggregate-reports.result == 'success' &&
      needs.generate-schema-diagrams.result == 'success' &&
      needs.generate-database-schema.result == 'success'
    uses: ./.github/workflows/deploy-pages.yaml
    with:
      coverage_artifact: aggregated-reports
      api_docs_artifact: api-docs
      security_artifact: aggregated-reports
      git_commit: ${{ github.sha }}
      git_branch: ${{ github.ref_name }}

  call-php-build-images:
    needs: [call-php-code-quality, call-php-unit-tests]
    if: |
      always() &&
      needs.call-php-code-quality.result == 'success' &&
      needs.call-php-unit-tests.result == 'success'
    uses: ./.github/workflows/php-build-images.yaml

  prepare-zmsautomation:
    name: Prepare zmsautomation
    needs: [call-php-build-images, call-zmscitizenview-build]
    runs-on: ubuntu-24.04
    # On push: always require approval to run assemble.
    # On workflow_dispatch: only require approval if explicitly requested (assembleZmsImage or runZmsautomation).
    if: ${{ (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && (inputs.assembleZmsImage || inputs.runZmsautomation))) && needs.call-php-build-images.result == 'success' && needs.call-zmscitizenview-build.result == 'success' }}
    environment: zms-assemble
    steps:
      - name: Await approval
        run: |
          echo 'Approved: proceeding to prepare zmsautomation (runner + assemble + tests).'

  build-zmsautomation-runner:
    name: Build zmsautomation-runner image
    needs: [prepare-zmsautomation]
    runs-on: ubuntu-24.04
    if: ${{ (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.runZmsautomation)) }}
    outputs:
      runnerTag: ${{ steps.runner-tag.outputs.value }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive runner tag
        id: runner-tag
        run: |
          set -euo pipefail
          echo "value=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .devcontainer/Containerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/zmsautomation-runner:${{ steps.runner-tag.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  call-assemble-zms-image:
    needs: [call-php-build-images, call-zmscitizenview-build, prepare-zmsautomation]
    # On push: job exists but is gated by an environment approval (no auto-run).
    # On workflow_dispatch: only schedule when explicitly requested (assembleZmsImage or runZmsautomation).
    if: ${{ (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && (inputs.assembleZmsImage || inputs.runZmsautomation))) && needs.call-php-build-images.result == 'success' && needs.call-zmscitizenview-build.result == 'success' }}
    uses: ./.github/workflows/assemble-zms-image.yaml

  call-zmsautomation:
    needs: [call-assemble-zms-image, build-zmsautomation-runner]
    # On push: job exists but is gated by an environment approval (no auto-run).
    # On workflow_dispatch: only schedule when explicitly requested.
    if: ${{ (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.runZmsautomation)) }}
    uses: ./.github/workflows/zmsautomation-manual.yaml
    with:
      imageTag: "" # derived inside workflow from ref_name when empty
      runnerImageTag: ${{ needs.build-zmsautomation-runner.outputs.runnerTag }}
      browser: ${{ inputs.browser }}
      screenshotEveryStep: "true"
      customTags: ${{ inputs.customTags }}