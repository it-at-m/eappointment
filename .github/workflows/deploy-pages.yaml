name: Deploy to GitHub Pages

on:
  workflow_call:
    inputs:
      coverage_artifact:
        description: 'Name of the coverage reports artifact'
        required: true
        type: string
        default: 'coverage-reports'
      api_docs_artifact:
        description: 'Name of the API documentation artifact'
        required: true
        type: string
        default: 'api-docs'
      git_commit:
        description: 'Git commit hash'
        required: true
        type: string
      git_branch:
        description: 'Git branch name'
        required: true
        type: string

permissions:
  pages: write
  id-token: write
  contents: read

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create public directory
        run: mkdir -p public

      - name: Download schema diagrams
        uses: actions/download-artifact@v7
        with:
          name: schema-diagrams
          path: public/diagrams

      - name: Download database schema diagrams
        uses: actions/download-artifact@v7
        with:
          name: database-schema-diagrams
          path: public/diagrams

      - name: Download coverage reports
        uses: actions/download-artifact@v7
        with:
          name: ${{ inputs.coverage_artifact }}
          path: public

      - name: Download API docs
        uses: actions/download-artifact@v7
        with:
          name: ${{ inputs.api_docs_artifact }}
          path: public

      - name: Setup Node for docs build
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Build documentation handbook (site root)
        run: |
          npm ci --prefix docs
          npm run docs:build --prefix docs
          cp -R docs/.vitepress/dist/. public/

      - name: Debug - List directory structure
        run: |
          echo "=== Directory Structure ==="
          ls -R public/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
