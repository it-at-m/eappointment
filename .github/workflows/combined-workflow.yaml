name: Combined Workflow

on:
  push:
    branches-ignore: [next]
    tags: ['*']
  workflow_call:

permissions:
  contents: read
  packages: write
  actions: write

jobs:
  call-php-code-quality:
    uses: ./.github/workflows/php-code-quality.yaml

  call-php-unit-tests:
    uses: ./.github/workflows/php-unit-tests.yaml

  call-zmsautomation-tests:
    uses: ./.github/workflows/zmsautomation-tests.yaml

  call-zmscitizenview-build:
    uses: ./.github/workflows/maven-node-build.yaml

  call-php-build-images:
    needs: [call-php-code-quality, call-php-unit-tests, call-zmsautomation-tests, call-zmscitizenview-build]
    if: |
      always() &&
      needs.call-php-code-quality.result == 'success' &&
      needs.call-php-unit-tests.result == 'success' &&
      needs.call-zmsautomation-tests.result == 'success' &&
      needs.call-zmscitizenview-build.result == 'success'
    uses: ./.github/workflows/php-build-images.yaml

  call-assemble-zms-image:
    needs: [call-php-build-images, call-zmscitizenview-build]
    if: |
      always() &&
      needs.call-php-build-images.result == 'success' &&
      needs.call-zmscitizenview-build.result == 'success'
    uses: ./.github/workflows/assemble-zms-image.yaml
