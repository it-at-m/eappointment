        with:
          name: docker-logs-zmsapi-api
          path: .github/ci-logs/zmsapi-api-*.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Tear down stack
        if: always()
        run: |
          docker compose -f .github/ci/zmsautomation-compose.yaml down -v || true

