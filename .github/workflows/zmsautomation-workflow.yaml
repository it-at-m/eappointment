name: ⚙️ zmsautomation
run-name: ${{ github.event_name == 'schedule' && 'zmsautomation | ⏰ scheduled | 🦊 firefox + 🌐 chrome | default tags | branch next' || format('zmsautomation | {0} | {1}', ((contains(inputs.cucumber_tag_expressions, '@rest') || contains(inputs.cucumber_tag_expressions, '@zmsapi') || contains(inputs.cucumber_tag_expressions, '@zmscitizenapi')) && (contains(inputs.cucumber_tag_expressions, '@web') || contains(inputs.cucumber_tag_expressions, '@zmsadmin') || contains(inputs.cucumber_tag_expressions, '@zmscitizenview') || contains(inputs.cucumber_tag_expressions, '@zmsstatistic') || contains(inputs.cucumber_tag_expressions, '@zmsticketprinter') || contains(inputs.cucumber_tag_expressions, '@zmscalldisplay') || contains(inputs.cucumber_tag_expressions, '@buergeransicht'))) && format('{0} + 🔌 api', inputs.browser == 'firefox' && '🦊 firefox' || (inputs.browser == 'edge' && '🪟 edge' || (inputs.browser == 'safari' && '🧭 safari' || '🌐 chrome'))) || ((contains(inputs.cucumber_tag_expressions, '@rest') || contains(inputs.cucumber_tag_expressions, '@zmsapi') || contains(inputs.cucumber_tag_expressions, '@zmscitizenapi')) && '🔌 api' || (inputs.browser == 'firefox' && '🦊 firefox' || (inputs.browser == 'edge' && '🪟 edge' || (inputs.browser == 'safari' && '🧭 safari' || '🌐 chrome')))), inputs.cucumber_tag_expressions) }}

on:
  workflow_dispatch:
    inputs:
      cucumber_tag_expressions:
        description: |
          Newline-separated Cucumber tag expressions. Each line is executed sequentially.
          ⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀
          Examples:⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀
          - @web and not @ignore 
          - @rest and @zmsapi and not @ignore 
          - @web and @zmscitizenview and @ZMSKVR-1124 
          - @rest and @zmscitizenapi and @ZMSKVR-1124 
          - (@rest or @web) and not @ignore 
          ⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀
          Available tags: ⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀
          - @web @rest 
          - @zmsadmin @zmsstatistic @zmscitizenview 
          - @zmsapi @zmscitizenapi
        required: true
        default: |
          (@rest or @web) and not @ignore
      browser:
        description: Choose browser for UI tests (Safari runs on a macOS job)
        required: true
        type: choice
        options:
          - chrome
          - firefox
          - edge
          - safari
        default: chrome
      per_step_screenshots:
        description: Enable/disable per-step screenshots
        required: true
        type: boolean
        default: true
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: read
  packages: read

jobs:
  zms-automation:
    if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.browser != 'safari') }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: ${{ fromJson(github.event_name == 'schedule' && '["chrome","firefox"]' || format('["{0}"]', inputs.browser)) }}
    env:
      # Align with php-build-images.yaml tagging logic for branches
      # (branch- + sanitize / and :)
      IMAGE_REGISTRY: ghcr.io
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          # Scheduled runs should execute against the `next` branch.
          ref: ${{ github.event_name == 'schedule' && 'next' || github.ref }}

      - name: Create runtime env file
        run: cp .devcontainer/.env.template .devcontainer/.env

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        shell: bash
        run: |
          set -euo pipefail
          REF_TYPE="${{ github.ref_type }}"
          REF_NAME="${{ github.ref_name }}"

          # Match `.github/workflows/php-build-images.yaml` tagging logic:
          # - for branches: branch-<sanitized>
          # - for tags: <tag-name> (no prefix)
          if [ "$REF_TYPE" = "branch" ]; then
            SANITIZED="$(echo "$REF_NAME" | sed 's/[\/:]/-/g')"
            PHP_TAG="branch-${SANITIZED}"
          else
            PHP_TAG="$REF_NAME"
          fi

          CITIZENVIEW_TAG_PRIMARY="$PHP_TAG"
          CITIZENVIEW_TAG_FALLBACK="$PHP_TAG"

          echo "branch_name=$REF_NAME" >> "$GITHUB_OUTPUT"
          echo "php_tag=$PHP_TAG" >> "$GITHUB_OUTPUT"
          echo "citizenview_tag_primary=$CITIZENVIEW_TAG_PRIMARY" >> "$GITHUB_OUTPUT"
          echo "citizenview_tag_fallback=$CITIZENVIEW_TAG_FALLBACK" >> "$GITHUB_OUTPUT"

      - name: Pull prebuilt PHP module images
        shell: bash
        run: |
          set -euo pipefail
          PHP_TAG="${{ steps.tags.outputs.php_tag }}"
          modules=(zmsadmin zmsapi zmscalldisplay zmscitizenapi zmsmessaging zmsstatistic zmsticketprinter)
          for m in "${modules[@]}"; do
            echo "Pulling $m:$PHP_TAG"
            docker pull "ghcr.io/${GITHUB_REPOSITORY}/${m}:$PHP_TAG"
          done

      - name: Pull prebuilt CitizenView image
        id: citizenview
        shell: bash
        run: |
          set -euo pipefail
          primary="${{ steps.tags.outputs.citizenview_tag_primary }}"
          fallback="${{ steps.tags.outputs.citizenview_tag_fallback }}"
          image_base="ghcr.io/${GITHUB_REPOSITORY}/zmscitizenview"

          echo "Pulling $image_base:$primary"
          if ! docker pull "$image_base:$primary"; then
            echo "Primary tag failed, falling back to $image_base:$fallback"
            docker pull "$image_base:$fallback"
            echo "citizenview_tag_used=$fallback" >> "$GITHUB_OUTPUT"
          else
            echo "citizenview_tag_used=$primary" >> "$GITHUB_OUTPUT"
          fi

      - name: Build zms-web base image (Apache+SSL)
        shell: bash
        run: |
          set -euo pipefail
          # Use the same apache/ssl setup as the local devcontainer base,
          # then overwrite module directories from the prebuilt GHCR module images.
          INSTALL_CHROME=0
          INSTALL_FIREFOX=0
          INSTALL_EDGE=0
          case "${{ matrix.browser }}" in
            chrome)
              INSTALL_CHROME=1
              ;;
            firefox)
              INSTALL_FIREFOX=1
              ;;
            edge)
              INSTALL_EDGE=1
              ;;
          esac
          docker build -t zms-web-base:ci \
            --build-arg INSTALL_CHROME="$INSTALL_CHROME" \
            --build-arg INSTALL_FIREFOX="$INSTALL_FIREFOX" \
            --build-arg INSTALL_EDGE="$INSTALL_EDGE" \
            --build-arg INSTALL_X11_TOOLS=1 \
            --build-arg INSTALL_PYTHON_TOOLS=1 \
            --build-arg INSTALL_NODE=1 \
            --build-arg INSTALL_COMPOSER=1 \
            --build-arg INSTALL_XDEBUG=0 \
            -f .devcontainer/Containerfile .devcontainer

      - name: Start required containers (stack once)
        shell: bash
        run: |
          set -euo pipefail

          CITIZENVIEW_TAG="${{ steps.citizenview.outputs.citizenview_tag_used }}"
          CITIZENVIEW_IMAGE="ghcr.io/${GITHUB_REPOSITORY}/zmscitizenview:${CITIZENVIEW_TAG}"

          # If the primary tag failed but we succeeded with fallback, the CI image is already pulled.
          # Compose can still reference the primary tag; if it isn't present, pull step would have failed.
          # This keeps the compose generation deterministic.

          cd .devcontainer

          cat > docker-compose.ci.yml <<'YAML'
          version: "3.8"
          services:
            web:
              image: zms-web-base:ci
              container_name: zms-web
              user: "root"
              volumes:
                - ..:/var/www/html
              env_file:
                - .env
              networks:
                - zms-ci-net

            citizenview:
              image: REPLACE_CITIZENVIEW_IMAGE
              container_name: zms-citizenview
              networks:
                - zms-ci-net

            db:
              image: mariadb:10.11
              container_name: zms-db
              restart: unless-stopped
              env_file:
                - .env
              volumes:
                - db-data:/var/lib/mysql
              networks:
                - zms-ci-net

            refarch-gateway:
              image: ghcr.io/it-at-m/refarch/refarch-gateway:1.7.0
              container_name: zms-refarch-gateway
              ports:
                - "8084:8080"
              environment:
                SPRING_PROFILES_ACTIVE: no-security
                WEBCOMPONENT_URI: http://localhost:8080
              volumes:
                - ./local-gateway-application.yml:/deployments/application.yml:ro
              restart: unless-stopped
              networks:
                - zms-ci-net

            keycloak:
              image: quay.io/keycloak/keycloak:26.5.3@sha256:5a236ae4dd8ece77490115bace15a11a4d15e9cbcf58a490b95a7da2cd71d32a
              container_name: zms-keycloak
              hostname: keycloak
              command:
                - start-dev
              environment:
                KC_BOOTSTRAP_ADMIN_USERNAME: admin
                KC_BOOTSTRAP_ADMIN_PASSWORD: admin
                KC_HEALTH_ENABLED: "true"
                KC_HTTP_PORT: 8080
                KC_HTTP_RELATIVE_PATH: /auth
                KC_DB: dev-file
              ports:
                - "8080:8080"
              volumes:
                - ./keycloak/plugins:/opt/keycloak/providers/
              networks:
                - zms-ci-net
              restart: unless-stopped

            init-keycloak:
              image: klg71/keycloakmigration:0.2.125@sha256:a326d3e50e2a35b70a3cf3a5d33288af9bcba27fef89146a2107622583e34231
              container_name: zms-init-keycloak
              depends_on:
                keycloak:
                  condition: service_started
              environment:
                ADMIN_USER: admin
                ADMIN_PASSWORD: admin
                BASEURL: http://keycloak:8080/auth
                WAIT_FOR_KEYCLOAK: "true"
                FAIL_ON_UNDEFINED_VARIABLES: "true"
                KEYCLOAK_CHANGELOG: /migration/keycloak-changelog.yml
              volumes:
                - ../.resources/keycloak/migration:/migration
              networks:
                - zms-ci-net
              restart: "no"

          volumes:
            db-data:

          networks:
            zms-ci-net:
              name: zms-ci-net
          YAML

          # Inject citizenview image
          sed -i "s|REPLACE_CITIZENVIEW_IMAGE|${CITIZENVIEW_IMAGE}|g" docker-compose.ci.yml

          # Best-effort cleanup from previous attempts on the same runner.
          docker compose -f docker-compose.ci.yml down -v --remove-orphans || true
          docker compose -f docker-compose.ci.yml up -d

          # Ensure Keycloak clients have been created before UI tests begin.
          # (init-keycloak is a one-shot container.)
          for _ in {1..60}; do
            state="$(docker inspect -f '{{.State.Status}}' zms-init-keycloak 2>/dev/null || echo missing)"
            if [ "$state" = "exited" ]; then
              echo "init-keycloak finished."
              docker logs zms-init-keycloak || true
              break
            fi
            sleep 2
          done

      - name: Install missing tooling inside web container
        # Some base images may not include Maven/Java and browser drivers.
        shell: bash
        run: |
          set -euo pipefail
          WEB_CONT="zms-web"
          TARGET_BROWSER="${{ matrix.browser }}"

          docker exec -u root -e TARGET_BROWSER="$TARGET_BROWSER" "$WEB_CONT" bash -lc '
            set -euo pipefail
            apt-get update

            # Core CLI utilities used by zmsautomation-test.
            apt-get install -y --no-install-recommends \
              curl wget unzip ca-certificates gnupg \
              mariadb-client \
              x11-utils x11-xserver-utils \
              xvfb \
              ;

            # Install only the selected browser + matching driver.
            if [[ "${TARGET_BROWSER:-}" == "firefox" ]]; then
              apt-get install -y --no-install-recommends firefox-esr
              # Prefer symlink for "firefox" path used by Selenium setups.
              ln -sf /usr/bin/firefox-esr /usr/bin/firefox || true

            elif [[ "${TARGET_BROWSER:-}" == "chrome" ]]; then
              apt-get install -y --no-install-recommends chromium chromium-driver

            elif [[ "${TARGET_BROWSER:-}" == "edge" ]]; then
              # Edge + EdgeDriver are installed only for edge runs.
              mkdir -p /etc/apt/keyrings
              rm -f /etc/apt/keyrings/microsoft.gpg
              curl -fsSL https://packages.microsoft.com/keys/microsoft.asc \
                | gpg --batch --yes --no-tty --dearmor -o /etc/apt/keyrings/microsoft.gpg
              echo "deb [arch=amd64 signed-by=/etc/apt/keyrings/microsoft.gpg] https://packages.microsoft.com/repos/edge stable main" \
                > /etc/apt/sources.list.d/microsoft-edge.list
              apt-get update
              apt-get install -y --no-install-recommends microsoft-edge-stable

              EDGE_VERSION="$(microsoft-edge --version | awk "{print \$3}")"
              EDGE_VERSION="${EDGE_VERSION%%-*}"
              curl -fsSL -o /tmp/msedgedriver.zip \
                "https://msedgedriver.microsoft.com/${EDGE_VERSION}/edgedriver_linux64.zip"
              unzip -o /tmp/msedgedriver.zip -d /tmp
              mv /tmp/msedgedriver /usr/local/bin/msedgedriver
              chmod +x /usr/local/bin/msedgedriver
              rm -f /tmp/msedgedriver.zip
            fi

            # geckodriver is needed only for firefox.
            if [[ "${TARGET_BROWSER:-}" == "firefox" ]] && ! command -v geckodriver >/dev/null 2>&1; then
              GECKODRIVER_VERSION="v0.36.0"
              wget -O /tmp/geckodriver.tar.gz \
                "https://github.com/mozilla/geckodriver/releases/download/${GECKODRIVER_VERSION}/geckodriver-${GECKODRIVER_VERSION}-linux64.tar.gz"
              tar -xzf /tmp/geckodriver.tar.gz -C /tmp
              mv /tmp/geckodriver /usr/local/bin/geckodriver
              chmod +x /usr/local/bin/geckodriver
              rm -f /tmp/geckodriver.tar.gz
            fi

            # Ensure Java/Maven are available for Flyway migrations (via Maven plugin).
            if ! command -v mvn >/dev/null 2>&1; then
              apt-get install -y --no-install-recommends gnupg
              rm -f /usr/share/keyrings/adoptium.gpg
              curl -fsSL https://packages.adoptium.net/artifactory/api/gpg/key/public \
                | gpg --batch --yes --no-tty --dearmor -o /usr/share/keyrings/adoptium.gpg
              echo "deb [signed-by=/usr/share/keyrings/adoptium.gpg] https://packages.adoptium.net/artifactory/deb $(. /etc/os-release && echo $VERSION_CODENAME) main" \
                > /etc/apt/sources.list.d/adoptium.list
              apt-get update
              apt-get install -y --no-install-recommends temurin-21-jdk

              export JAVA_HOME="/usr/lib/jvm/temurin-21-jdk-$(dpkg --print-architecture)"
              export PATH="$JAVA_HOME/bin:$PATH"

              MAVEN_VERSION="3.9.12"
              curl -fsSL -o /tmp/maven.tar.gz \
                "https://archive.apache.org/dist/maven/maven-3/${MAVEN_VERSION}/binaries/apache-maven-${MAVEN_VERSION}-bin.tar.gz"
              curl -fsSL -o /tmp/maven.tar.gz.sha512 \
                "https://archive.apache.org/dist/maven/maven-3/${MAVEN_VERSION}/binaries/apache-maven-${MAVEN_VERSION}-bin.tar.gz.sha512"
              echo "$(cat /tmp/maven.tar.gz.sha512)  /tmp/maven.tar.gz" | sha512sum -c - \
                && tar -xzf /tmp/maven.tar.gz -C /opt \
                && ln -s /opt/apache-maven-${MAVEN_VERSION}/bin/mvn /usr/local/bin/mvn
              rm -f /tmp/maven.tar.gz /tmp/maven.tar.gz.sha512
            fi

            # Ensure Apache SSL is available on :443 (required by keycloak redirect URLs).
            # If HTTPS fails, we configure the same self-signed cert & default-ssl site as the devcontainer.
            if ! curl -k --max-time 5 -s -o /dev/null "https://localhost/" ; then
              apt-get install -y --no-install-recommends openssl
              mkdir -p /etc/ssl/private /etc/ssl/certs
              openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
                -keyout /etc/ssl/private/apache-selfsigned.key \
                -out /etc/ssl/certs/apache-selfsigned.crt \
                -subj "/C=DE/ST=Dev/L=Dev/O=Dev/OU=Dev/CN=localhost"
              mkdir -p /etc/apache2/sites-available
              cp /var/www/html/.devcontainer/apache-ssl.conf /etc/apache2/sites-available/default-ssl.conf

              # Enable SSL module/site when available.
              (a2enmod ssl || true)
              (a2ensite default-ssl || true)

              # Restart Apache (best effort across image variants).
              (service apache2 restart || service httpd restart || apache2ctl -k restart || true)
            fi

            echo "Tooling setup complete."
          '

      - name: Inject prebuilt module directories into zms-web
        shell: bash
        run: |
          set -euo pipefail
          WEB_CONT="zms-web"
          PHP_TAG="${{ steps.tags.outputs.php_tag }}"
          modules=(zmsadmin zmsapi zmscalldisplay zmscitizenapi zmsmessaging zmsstatistic zmsticketprinter)

          for m in "${modules[@]}"; do
            echo "Injecting $m from GHCR image tag $PHP_TAG into $WEB_CONT:/var/www/html/$m"
            temp_id="$(docker create "ghcr.io/${GITHUB_REPOSITORY}/${m}:$PHP_TAG")"
            docker exec -u root "$WEB_CONT" bash -lc "mkdir -p /var/www/html/${m}"
            # `docker cp` between two containers is not supported.
            # Copy temp container -> runner filesystem -> zms-web container.
            tmp_dir="$(mktemp -d)"
            docker cp "${temp_id}:/var/www/html/." "$tmp_dir/"
            docker cp "$tmp_dir/." "$WEB_CONT:/var/www/html/${m}/"
            rm -rf "$tmp_dir"
            docker rm "$temp_id" >/dev/null

            docker exec -u root "$WEB_CONT" bash -lc "chown -R www-data:www-data /var/www/html/${m} 2>/dev/null || true; chmod -R 755 /var/www/html/${m} 2>/dev/null || true"
          done

      - name: Ensure writable cache directories
        shell: bash
        run: |
          set -euo pipefail
          WEB_CONT="zms-web"
          docker exec -u root "$WEB_CONT" bash -lc '
            set -euo pipefail
            # Global cache dir required by CACHE_DIR=/var/www/html/cache in .env.template
            mkdir -p /var/www/html/cache
            chown -R www-data:www-data /var/www/html/cache 2>/dev/null || true
            chmod -R 777 /var/www/html/cache 2>/dev/null || true

            # Module cache dirs (local devcontainer does similar in postStartCommand)
            for dir in zmsadmin zmsapi zmscalldisplay zmscitizenapi zmsstatistic zmsticketprinter zmsmessaging; do
              mkdir -p "/var/www/html/$dir/cache"
              chown -R www-data:www-data "/var/www/html/$dir/cache" 2>/dev/null || true
              chmod -R 777 "/var/www/html/$dir/cache" 2>/dev/null || true
            done
          '

      - name: Run zmsautomation ATAF tests sequentially (by tag lines)
        shell: bash
        run: |
          set -euo pipefail

          WEB_CONT="zms-web"
          BROWSER="${{ matrix.browser }}"
          SCREENSHOT="${{ inputs.per_step_screenshots }}"
          INPUTS="${{ github.event_name == 'schedule' && '(@rest or @web) and not @ignore' || inputs.cucumber_tag_expressions }}"

          # Split by newlines and run sequentially.
          fail_any=0
          while IFS= read -r line; do
            # Normalize input:
            # - strip possible Windows CR (\r)
            # - trim leading/trailing whitespace
            expr="$(printf '%s' "$line" | tr -d '\r' | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"
            if [ -z "$expr" ]; then
              continue
            fi

            echo "Running zmsautomation-test for tags: $expr"
            set +e
            # Pass arguments positionally to avoid accidental quoting issues with -Dcucumber.filter.tags.
            docker exec -u root "$WEB_CONT" bash -lc '
              set -euo pipefail
              set -a
              source /var/www/html/.devcontainer/.env
              tags="$1"
              SCREENSHOT_EVERY_STEP="$2"
              ZMS_BROWSER="$3"
              WEBDRIVER_RETRY_MAX_ATTEMPTS="${WEBDRIVER_RETRY_MAX_ATTEMPTS:-4}"
              WEBDRIVER_RETRY_DELAY_SECONDS="${WEBDRIVER_RETRY_DELAY_SECONDS:-30}"
              # Use one canonical citizenview base URL in CI for both health checks
              # and mail links written into the test database.
              CITIZENVIEW_BASE_URI="http://citizenview:8080/"
              
              # The zmsautomation pom enables Cucumber runners per profile:
              # - `ataf-ui` runs `UiTestRunner`
              # - `ataf-api` runs `ApiTestRunner`
              # The base `ataf` profile can result in 0 discovered tests, so we
              # activate the matching runner profile(s) based on the tag expression.
              profiles=()
              if [[ "$tags" == *"@web"* ]]; then
                profiles+=("-Pataf-ui")
              fi
              if [[ "$tags" == *"@rest"* || "$tags" == *"@zmsapi"* || "$tags" == *"@zmscitizenapi"* ]]; then
                profiles+=("-Pataf-api")
              fi
              if [ "${#profiles[@]}" -eq 0 ]; then
                profiles=("-Pataf-ui")
              fi

              bash /var/www/html/zmsautomation/zmsautomation-test \
                "${profiles[@]}" \
                -Dcucumber.filter.tags="$tags"
            ' -- "$expr" "$SCREENSHOT" "$BROWSER"
            rc=$?
            set -e

            if [ "$rc" -ne 0 ]; then
              echo "Tag run failed (exit $rc): $expr"
              fail_any=1
            fi
          done <<< "$INPUTS"

          if [ "$fail_any" -ne 0 ]; then
            echo "At least one tag expression run failed."
            exit 1
          fi

      - name: Upload test reports (best effort)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zmsautomation-ataf-reports-${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.browser }}
          path: |
            zmsautomation/target/cucumber.json
            zmsautomation/target/site/cucumber-pretty/**
            zmsautomation/target/surefire-reports/**
            zmsautomation/target/screenshots/**
          if-no-files-found: warn

      - name: Collect docker container logs
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/container-logs

          # Always capture container overview for debugging.
          docker ps -a > artifacts/container-logs/docker-ps-a.txt 2>&1 || true

          containers=(
            zms-web
            zms-citizenview
            zms-db
            zms-keycloak
            zms-refarch-gateway
            zms-init-keycloak
          )

          for c in "${containers[@]}"; do
            if docker inspect "$c" >/dev/null 2>&1; then
              docker logs "$c" > "artifacts/container-logs/${c}.log" 2>&1 || true
              docker inspect "$c" > "artifacts/container-logs/${c}.inspect.json" 2>/dev/null || true
            fi
          done

      - name: Upload container logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zmsautomation-container-logs-${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.browser }}
          path: artifacts/container-logs/**
          if-no-files-found: warn

  zms-automation-safari:
    needs: zms-automation-safari-prepare
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.browser == 'safari' }}
    # https://github.blog/changelog/2026-02-26-macos-26-is-now-generally-available-for-github-hosted-runners/
    # https://github.com/actions/runner-images/blob/main/images/macos/macos-26-Readme.md#browsers
    runs-on: macos-26-intel
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'schedule' && 'next' || github.ref }}

      - name: Create runtime env file
        run: cp .devcontainer/.env.template .devcontainer/.env

      - name: Setup Docker on macOS
        shell: bash
        run: |
          set -euo pipefail
          # Colima needs a Docker CLI on the host.
          if ! command -v docker >/dev/null 2>&1; then
            brew install docker >/dev/null
          fi
          # qemu backend needs qemu-img available.
          if ! command -v qemu-img >/dev/null 2>&1; then
            brew install qemu >/dev/null
          fi

          # Prefer Colima over Docker Desktop for CI-friendly Docker CLI.
          # (Hosted runners may already have a Docker engine; this is best-effort.)
          if ! command -v colima >/dev/null 2>&1; then
            brew install colima >/dev/null
          fi
          if ! colima status >/dev/null 2>&1; then
            # Runner images occasionally fail on one backend (e.g. Lima hostagent panic).
            # Try both backends with cleanup between attempts.
            started=0
            for backend in vz qemu; do
              echo "Starting Colima with backend: $backend"
              colima delete --force >/dev/null 2>&1 || true
              if colima start --runtime docker --vm-type "$backend" --cpu 4 --memory 12 --disk 40; then
                started=1
                echo "Colima started with backend: $backend"
                break
              fi
              echo "Colima start failed for backend: $backend"
            done
            if [ "$started" -ne 1 ]; then
              echo "Unable to start Colima with any supported backend."
              exit 1
            fi
          fi

          # Ensure Docker CLI can reach the daemon.
          docker version

          # Ensure `docker compose` subcommand is available (Colima often provides it, but hosted runners may vary).
          if ! docker compose version >/dev/null 2>&1; then
            brew install docker-compose >/dev/null || true
          fi
          docker compose version

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        shell: bash
        run: |
          set -euo pipefail
          REF_TYPE="${{ github.ref_type }}"
          REF_NAME="${{ github.ref_name }}"

          if [ "$REF_TYPE" = "branch" ]; then
            SANITIZED="$(echo "$REF_NAME" | sed 's/[\/:]/-/g')"
            PHP_TAG="branch-${SANITIZED}"
          else
            PHP_TAG="$REF_NAME"
          fi

          CITIZENVIEW_TAG_PRIMARY="$PHP_TAG"
          CITIZENVIEW_TAG_FALLBACK="$PHP_TAG"

          echo "branch_name=$REF_NAME" >> "$GITHUB_OUTPUT"
          echo "php_tag=$PHP_TAG" >> "$GITHUB_OUTPUT"
          echo "citizenview_tag_primary=$CITIZENVIEW_TAG_PRIMARY" >> "$GITHUB_OUTPUT"
          echo "citizenview_tag_fallback=$CITIZENVIEW_TAG_FALLBACK" >> "$GITHUB_OUTPUT"

      - name: Pull prebuilt CitizenView image
        id: citizenview
        shell: bash
        run: |
          set -euo pipefail
          primary="${{ steps.tags.outputs.citizenview_tag_primary }}"
          fallback="${{ steps.tags.outputs.citizenview_tag_fallback }}"
          image_base="ghcr.io/${GITHUB_REPOSITORY}/zmscitizenview"

          echo "Pulling $image_base:$primary"
          if ! docker pull "$image_base:$primary"; then
            echo "Primary tag failed, falling back to $image_base:$fallback"
            docker pull "$image_base:$fallback"
            echo "citizenview_tag_used=$fallback" >> "$GITHUB_OUTPUT"
          else
            echo "citizenview_tag_used=$primary" >> "$GITHUB_OUTPUT"
          fi

      - name: Start required containers (stack once) - host mapped ports
        shell: bash
        run: |
          set -euo pipefail

          CITIZENVIEW_TAG="${{ steps.citizenview.outputs.citizenview_tag_used }}"
          CITIZENVIEW_IMAGE="ghcr.io/${GITHUB_REPOSITORY}/zmscitizenview:${CITIZENVIEW_TAG}"
          WEB_IMAGE="${{ needs.zms-automation-safari-prepare.outputs.web_image }}"

          cd .devcontainer

          cat > docker-compose.ci.macos.yml <<'YAML'
          version: "3.8"
          services:
            web:
              image: REPLACE_WEB_IMAGE
              container_name: zms-web
              user: "root"
              volumes:
                - ..:/var/www/html
              env_file:
                - .env
              networks:
                - zms-ci-net
              ports:
                - "80:80"
                - "443:443"

            citizenview:
              image: REPLACE_CITIZENVIEW_IMAGE
              container_name: zms-citizenview
              networks:
                - zms-ci-net
              ports:
                - "8080:8080"
                - "8082:8082"

            db:
              image: mariadb:10.11
              container_name: zms-db
              restart: unless-stopped
              env_file:
                - .env
              volumes:
                - db-data:/var/lib/mysql
              networks:
                - zms-ci-net
              ports:
                - "3306:3306"

            refarch-gateway:
              image: ghcr.io/it-at-m/refarch/refarch-gateway:1.7.0
              container_name: zms-refarch-gateway
              ports:
                - "8084:8080"
              environment:
                SPRING_PROFILES_ACTIVE: no-security
                # Apache on zms-web serves the webcomponent; gateway should target that container over the network.
                WEBCOMPONENT_URI: http://zms-web:80
              volumes:
                - ./local-gateway-application.yml:/deployments/application.yml:ro
              restart: unless-stopped
              networks:
                - zms-ci-net

            keycloak:
              image: quay.io/keycloak/keycloak:26.5.3@sha256:5a236ae4dd8ece77490115bace15a11a4d15e9cbcf58a490b95a7da2cd71d32a
              container_name: zms-keycloak
              hostname: keycloak
              command:
                - start-dev
              environment:
                KC_BOOTSTRAP_ADMIN_USERNAME: admin
                KC_BOOTSTRAP_ADMIN_PASSWORD: admin
                KC_HEALTH_ENABLED: "true"
                KC_HTTP_PORT: 8080
                KC_HTTP_RELATIVE_PATH: /auth
                KC_DB: dev-file
              ports:
                # Avoid host-port conflict with citizenview (mapped to 8080 above).
                - "8081:8080"
              volumes:
                - ./keycloak/plugins:/opt/keycloak/providers/
              networks:
                - zms-ci-net
              restart: unless-stopped

            init-keycloak:
              image: klg71/keycloakmigration:0.2.125@sha256:a326d3e50e2a35b70a3cf3a5d33288af9bcba27fef89146a2107622583e34231
              container_name: zms-init-keycloak
              depends_on:
                keycloak:
                  condition: service_started
              environment:
                ADMIN_USER: admin
                ADMIN_PASSWORD: admin
                BASEURL: http://keycloak:8080/auth
                WAIT_FOR_KEYCLOAK: "true"
                FAIL_ON_UNDEFINED_VARIABLES: "true"
                KEYCLOAK_CHANGELOG: /migration/keycloak-changelog.yml
              volumes:
                - ../.resources/keycloak/migration:/migration
              networks:
                - zms-ci-net
              restart: "no"

          volumes:
            db-data:

          networks:
            zms-ci-net:
              name: zms-ci-net
          YAML

          sed -i '' -e "s|REPLACE_WEB_IMAGE|${WEB_IMAGE}|g" docker-compose.ci.macos.yml
          # BSD sed (macOS) requires an explicit in-place backup suffix argument.
          sed -i '' -e "s|REPLACE_CITIZENVIEW_IMAGE|${CITIZENVIEW_IMAGE}|g" docker-compose.ci.macos.yml

          docker compose -f docker-compose.ci.macos.yml down -v --remove-orphans || true
          docker compose -f docker-compose.ci.macos.yml up -d

          for _ in {1..60}; do
            state="$(docker inspect -f '{{.State.Status}}' zms-init-keycloak 2>/dev/null || echo missing)"
            if [ "$state" = "exited" ]; then
              echo "init-keycloak finished."
              docker logs zms-init-keycloak || true
              break
            fi
            sleep 2
          done

      - name: Inject prebuilt module directories into zms-web
        shell: bash
        run: |
          set -euo pipefail
          WEB_CONT="zms-web"
          PHP_TAG="${{ steps.tags.outputs.php_tag }}"
          modules=(zmsadmin zmsapi zmscalldisplay zmscitizenapi zmsmessaging zmsstatistic zmsticketprinter)

          for m in "${modules[@]}"; do
            echo "Injecting $m from GHCR image tag $PHP_TAG into $WEB_CONT:/var/www/html/$m"
            temp_id="$(docker create "ghcr.io/${GITHUB_REPOSITORY}/${m}:$PHP_TAG")"
            docker exec -u root "$WEB_CONT" bash -lc "mkdir -p /var/www/html/${m}"
            tmp_dir="$(mktemp -d)"
            docker cp "${temp_id}:/var/www/html/." "$tmp_dir/"
            docker cp "$tmp_dir/." "$WEB_CONT:/var/www/html/${m}/"
            rm -rf "$tmp_dir"
            docker rm "$temp_id" >/dev/null

            docker exec -u root "$WEB_CONT" bash -lc "chown -R www-data:www-data /var/www/html/${m} 2>/dev/null || true; chmod -R 755 /var/www/html/${m} 2>/dev/null || true"
          done

      - name: Ensure writable cache directories
        shell: bash
        run: |
          set -euo pipefail
          WEB_CONT="zms-web"
          docker exec -u root "$WEB_CONT" bash -lc '
            set -euo pipefail
            mkdir -p /var/www/html/cache
            chown -R www-data:www-data /var/www/html/cache 2>/dev/null || true
            chmod -R 777 /var/www/html/cache 2>/dev/null || true

            for dir in zmsadmin zmsapi zmscalldisplay zmscitizenapi zmsstatistic zmsticketprinter zmsmessaging; do
              mkdir -p "/var/www/html/$dir/cache"
              chown -R www-data:www-data "/var/www/html/$dir/cache" 2>/dev/null || true
              chmod -R 777 "/var/www/html/$dir/cache" 2>/dev/null || true
            done
          '

      - name: Enable Safari WebDriver
        shell: bash
        run: |
          set -euo pipefail
          # On hosted runners this should be best-effort; if it fails, Safari UI tests will fail fast.
          sudo safaridriver --enable
          safaridriver --version || true
          which safaridriver || true

      - name: Setup Java and Maven (host)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Ensure Maven on host
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v mvn >/dev/null 2>&1; then
            brew install maven >/dev/null
          fi
          mvn -v

      - name: Setup PHP 8.3 (host)
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"

      - name: Run zmsautomation ATAF tests (Safari) on host
        shell: bash
        run: |
          set -euo pipefail

          # MySQL client tools are required for backup/restore in zmsautomation-test.
          if ! command -v mysql >/dev/null 2>&1; then
            brew install mysql-client >/dev/null || brew install mariadb >/dev/null
          fi
          if ! command -v mysqldump >/dev/null 2>&1; then
            brew install mariadb >/dev/null
          fi

          # Load DB credentials and defaults from the devcontainer env file.
          set -a
          source .devcontainer/.env
          set +a

          # Override DB host to the Docker-mapped host port.
          export MYSQL_HOST="127.0.0.1"
          export MYSQL_ROOT_PASSWORD="${MARIADB_ROOT_PASSWORD:-root}"

          # Cache dir must exist on the host (it is mounted into containers via the repo volume).
          export CACHE_DIR="${GITHUB_WORKSPACE}/cache"

          # Mirror the local CLI expectations: gateway/admin on HTTPS via zms-web.
          export BASE_URI="https://localhost/terminvereinbarung/api/2"
          export CITIZEN_API_BASE_URI="https://localhost/terminvereinbarung/api/citizen"
          export ADMIN_BASE_URI="https://localhost/terminvereinbarung/admin/"

          # CitizenView port differs between images (Linux CI often uses 8080 internally).
          # Probe both host-mapped ports and use the first one that responds with 2xx/3xx.
          CITIZENVIEW_PORT=""
          for p in 8080 8082; do
            code="$(curl -sS -o /dev/null -w "%{http_code}" --max-time 5 "http://localhost:${p}/" || echo 000)"
            if [[ "$code" =~ ^[23][0-9][0-9]$ ]]; then
              CITIZENVIEW_PORT="$p"
              break
            fi
          done
          if [ -z "$CITIZENVIEW_PORT" ]; then
            CITIZENVIEW_PORT="8080"
          fi
          export CITIZENVIEW_BASE_URI="http://localhost:${CITIZENVIEW_PORT}/"
          export REFARCH_GATEWAY_OFFICES_URL="http://localhost:8084/buergeransicht/api/citizen/offices-and-services/"

          export ZMS_BROWSER="safari"
          export SCREENSHOT_EVERY_STEP="${{ inputs.per_step_screenshots }}"
          export WEBDRIVER_SAFARI_DRIVER="$(which safaridriver)"

          # Split by newlines and run sequentially (same contract as the Linux job).
          fail_any=0
          INPUTS="${{ inputs.cucumber_tag_expressions }}"
          while IFS= read -r line; do
            expr="$(printf '%s' "$line" | tr -d '\r' | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"
            if [ -z "$expr" ]; then
              continue
            fi

            echo "Running zmsautomation-test for tags: $expr"
            set +e
            bash ./zmsautomation/zmsautomation-test \
              -Pataf-ui \
              -Dcucumber.filter.tags="$expr"
            rc=$?
            set -e

            if [ "$rc" -ne 0 ]; then
              echo "Tag run failed (exit $rc): $expr"
              fail_any=1
            fi
          done <<< "$INPUTS"

          if [ "$fail_any" -ne 0 ]; then
            echo "At least one tag expression run failed."
            exit 1
          fi

      - name: Upload test reports (best effort)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zmsautomation-ataf-reports-safari-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            zmsautomation/target/cucumber.json
            zmsautomation/target/site/cucumber-pretty/**
            zmsautomation/target/surefire-reports/**
            zmsautomation/target/screenshots/**
          if-no-files-found: warn

      - name: Collect docker container logs (best effort)
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/container-logs
          docker ps -a > artifacts/container-logs/docker-ps-a.txt 2>&1 || true

          containers=(
            zms-web
            zms-citizenview
            zms-db
            zms-keycloak
            zms-refarch-gateway
            zms-init-keycloak
          )

          for c in "${containers[@]}"; do
            if docker inspect "$c" >/dev/null 2>&1; then
              docker logs "$c" > "artifacts/container-logs/${c}.log" 2>&1 || true
              docker inspect "$c" > "artifacts/container-logs/${c}.inspect.json" 2>/dev/null || true
            fi
          done

      - name: Upload container logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zmsautomation-container-logs-safari-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/container-logs/**
          if-no-files-found: warn

  zms-automation-safari-prepare:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.browser == 'safari' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      web_image: ${{ steps.prepare.outputs.web_image }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'schedule' && 'next' || github.ref }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        shell: bash
        run: |
          set -euo pipefail
          REF_TYPE="${{ github.ref_type }}"
          REF_NAME="${{ github.ref_name }}"
          if [ "$REF_TYPE" = "branch" ]; then
            SANITIZED="$(echo "$REF_NAME" | sed 's/[\/:]/-/g')"
            PHP_TAG="branch-${SANITIZED}"
          else
            PHP_TAG="$REF_NAME"
          fi
          echo "php_tag=$PHP_TAG" >> "$GITHUB_OUTPUT"

      - name: Pull prebuilt PHP module images
        shell: bash
        run: |
          set -euo pipefail
          PHP_TAG="${{ steps.tags.outputs.php_tag }}"
          modules=(zmsadmin zmsapi zmscalldisplay zmscitizenapi zmsmessaging zmsstatistic zmsticketprinter)
          for m in "${modules[@]}"; do
            echo "Pulling $m:$PHP_TAG"
            docker pull "ghcr.io/${GITHUB_REPOSITORY}/${m}:$PHP_TAG"
          done

      - name: Build and publish prepared zms-web image
        id: prepare
        shell: bash
        run: |
          set -euo pipefail
          PHP_TAG="${{ steps.tags.outputs.php_tag }}"
          modules=(zmsadmin zmsapi zmscalldisplay zmscitizenapi zmsmessaging zmsstatistic zmsticketprinter)

          docker build -t zms-web-base:ci \
            --build-arg INSTALL_CHROME=0 \
            --build-arg INSTALL_FIREFOX=0 \
            --build-arg INSTALL_EDGE=0 \
            --build-arg INSTALL_X11_TOOLS=0 \
            --build-arg INSTALL_PYTHON_TOOLS=0 \
            --build-arg INSTALL_NODE=0 \
            --build-arg INSTALL_COMPOSER=0 \
            --build-arg INSTALL_XDEBUG=0 \
            -f .devcontainer/Containerfile .devcontainer

          PREP_CONT="zms-web-prep"
          docker rm -f "$PREP_CONT" >/dev/null 2>&1 || true
          docker run -d --name "$PREP_CONT" zms-web-base:ci sleep infinity

          for m in "${modules[@]}"; do
            echo "Injecting $m from GHCR image tag $PHP_TAG into $PREP_CONT:/var/www/html/$m"
            temp_id="$(docker create "ghcr.io/${GITHUB_REPOSITORY}/${m}:$PHP_TAG")"
            docker exec -u root "$PREP_CONT" bash -lc "mkdir -p /var/www/html/${m}"
            tmp_dir="$(mktemp -d)"
            docker cp "${temp_id}:/var/www/html/." "$tmp_dir/"
            docker cp "$tmp_dir/." "$PREP_CONT:/var/www/html/${m}/"
            rm -rf "$tmp_dir"
            docker rm "$temp_id" >/dev/null
            docker exec -u root "$PREP_CONT" bash -lc "chown -R www-data:www-data /var/www/html/${m} 2>/dev/null || true; chmod -R 755 /var/www/html/${m} 2>/dev/null || true"
          done

          WEB_IMAGE="ghcr.io/${GITHUB_REPOSITORY}/zms-web-prepared:${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          docker commit "$PREP_CONT" "$WEB_IMAGE"
          docker push "$WEB_IMAGE"
          docker rm -f "$PREP_CONT" >/dev/null 2>&1 || true
          echo "web_image=$WEB_IMAGE" >> "$GITHUB_OUTPUT"
