name: ⚙️ zmsautomation
run-name: ${{ github.event_name == 'schedule' && 'zmsautomation | ⏰ scheduled | api+ui | 🦊 firefox + 🌐 chrome | main + next' || (github.event_name == 'workflow_dispatch' && inputs.run_main_next_matrix && 'zmsautomation | ▶️ manual | api+ui | main + next matrix | 🦊 firefox + 🌐 chrome') || format('zmsautomation | ▶️ manual | {0} | {1} | {2}', inputs.test_layer, inputs.browser == 'firefox' && '🦊 firefox' || (inputs.browser == 'edge' && '🪟 edge' || '🌐 chrome'), inputs.cucumber_tag_expressions) }}

on:
  workflow_dispatch:
    inputs:
      run_main_next_matrix:
        description: |
          Run the full scheduled matrix: branches main + next, browsers chrome + firefox,
          all API + UI tests (minus @ignore). Ignores test layer, browser, and tag inputs below.
        required: true
        type: boolean
        default: false
      test_layer:
        description: |
          Primary test selector. API = REST (features/rest), UI = Selenium (features/ui),
          both = full suite in one run.
        required: true
        type: choice
        options:
          - both
          - api
          - ui
        default: both
      cucumber_tag_expressions:
        description: |
          Optional. Newline-separated Cucumber tag expressions; each line runs sequentially
          within the selected layer(s). @ignore is excluded automatically.
          ⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀
          Examples:⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀
          - @ZMSKVR-1328
          - @smoke
          - @zmsadmin
          ⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀
          Leave empty to run all tests in the selected layer(s).
        required: false
        default: ""
      browser:
        description: Choose browser for UI tests
        required: true
        type: choice
        options:
          - chrome
          - firefox
          - edge
        default: chrome
      per_step_screenshots:
        description: Enable/disable per-step screenshots
        required: true
        type: boolean
        default: true
  schedule:
    # GitHub Actions cron uses UTC. 03:00 UTC ≈ 05:00 Europe/Berlin (CEST) / 04:00 (CET).
    - cron: "0 3 * * *"

permissions:
  contents: read
  packages: read

jobs:
  zms-automation:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # Limit concurrent matrix legs to reduce Docker daemon / disk pressure on shared runners.
      max-parallel: 2
      matrix:
        branch: ${{ fromJson((github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.run_main_next_matrix)) && '["main","next"]' || format('["{0}"]', github.ref_name)) }}
        browser: ${{ fromJson((github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.run_main_next_matrix)) && '["chrome","firefox"]' || format('["{0}"]', inputs.browser)) }}
    env:
      # Align with php-build-images.yaml tagging logic for branches
      # (branch- + sanitize / and :)
      IMAGE_REGISTRY: ghcr.io
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: ${{ (github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.run_main_next_matrix)) && matrix.branch || github.ref }}

      - name: Create runtime env file
        run: cp .devcontainer/.env.template .devcontainer/.env

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        shell: bash
        run: |
          set -euo pipefail
          # Schedule events don't provide the target branch as workflow_dispatch does.
          REF_TYPE="${{ (github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.run_main_next_matrix)) && 'branch' || github.ref_type }}"
          REF_NAME="${{ (github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.run_main_next_matrix)) && matrix.branch || github.ref_name }}"

          # Match `.github/workflows/php-build-images.yaml` tagging logic:
          # - for branches: branch-<sanitized>
          # - for tags: <tag-name> (no prefix)
          if [ "$REF_TYPE" = "branch" ]; then
            SANITIZED="$(echo "$REF_NAME" | sed 's/[\/:]/-/g')"
            PHP_TAG="branch-${SANITIZED}"
          else
            PHP_TAG="$REF_NAME"
          fi

          BRANCH_SLUG="$(echo "$REF_NAME" | sed 's/[\/:]/-/g')"

          echo "branch_name=$REF_NAME" >> "$GITHUB_OUTPUT"
          echo "branch_slug=$BRANCH_SLUG" >> "$GITHUB_OUTPUT"
          echo "php_tag=$PHP_TAG" >> "$GITHUB_OUTPUT"

      - name: Pull prebuilt PHP module images
        shell: bash
        run: |
          set -euo pipefail
          PHP_TAG="${{ steps.tags.outputs.php_tag }}"
          modules=(zmsadmin zmsapi zmscalldisplay zmscitizenapi zmsmessaging zmsstatistic zmsticketprinter)
          for m in "${modules[@]}"; do
            echo "Pulling $m:$PHP_TAG"
            docker pull "ghcr.io/${GITHUB_REPOSITORY}/${m}:$PHP_TAG"
          done

      - name: Start required containers (stack once)
        shell: bash
        run: |
          set -euo pipefail

          cd .devcontainer

          # Omit phpmyadmin to keep CI lean.
          docker compose -f docker-compose.yaml down -v --remove-orphans || true
          docker compose -f docker-compose.yaml up -d \
            web db citizenview refarch-gateway keycloak init-keycloak

          # Ensure Keycloak clients have been created before UI tests begin.
          # (init-keycloak is a one-shot container.)
          for _ in {1..60}; do
            state="$(docker inspect -f '{{.State.Status}}' zms-init-keycloak 2>/dev/null || echo missing)"
            if [ "$state" = "exited" ]; then
              echo "init-keycloak finished."
              docker logs zms-init-keycloak || true
              break
            fi
            sleep 2
          done

      - name: Install missing tooling inside web container
        # Some base images may not include Maven/Java and browser drivers.
        shell: bash
        run: |
          set -euo pipefail
          WEB_CONT="zms-web"
          TARGET_BROWSER="${{ matrix.browser }}"

          docker exec -u root -e TARGET_BROWSER="$TARGET_BROWSER" "$WEB_CONT" bash -lc '
            set -euo pipefail
            apt-get update

            # Pin Chromium: trixie-security ships 150.x which exits immediately in CI Docker
            # (SessionNotCreatedException). Hold trixie/main 147.x until 150 works in CI.
            CHROMIUM_APT_VERSION="147.0.7727.137-1~deb13u1"
            apt-get install -y --no-install-recommends --allow-downgrades \
              curl wget unzip ca-certificates gnupg \
              mariadb-client \
              x11-utils x11-xserver-utils \
              xvfb \
              firefox-esr \
              "chromium-common=${CHROMIUM_APT_VERSION}" \
              "chromium=${CHROMIUM_APT_VERSION}" \
              "chromium-driver=${CHROMIUM_APT_VERSION}" \
              ;
            chromium --version
            chromedriver --version

            # Prefer symlink for "firefox" path used by Selenium setups.
            ln -sf /usr/bin/firefox-esr /usr/bin/firefox || true

            # Install Edge + EdgeDriver only when edge browser is selected.
            if [[ "${TARGET_BROWSER:-}" == "edge" ]]; then
              mkdir -p /etc/apt/keyrings
              rm -f /etc/apt/keyrings/microsoft.gpg
              curl -fsSL https://packages.microsoft.com/keys/microsoft.asc \
                | gpg --batch --yes --no-tty --dearmor -o /etc/apt/keyrings/microsoft.gpg
              echo "deb [arch=amd64 signed-by=/etc/apt/keyrings/microsoft.gpg] https://packages.microsoft.com/repos/edge stable main" \
                > /etc/apt/sources.list.d/microsoft-edge.list
              apt-get update
              apt-get install -y --no-install-recommends microsoft-edge-stable

              EDGE_VERSION="$(microsoft-edge --version | awk "{print \$3}")"
              EDGE_VERSION="${EDGE_VERSION%%-*}"
              curl -fsSL -o /tmp/msedgedriver.zip \
                "https://msedgedriver.microsoft.com/${EDGE_VERSION}/edgedriver_linux64.zip"
              unzip -o /tmp/msedgedriver.zip -d /tmp
              mv /tmp/msedgedriver /usr/local/bin/msedgedriver
              chmod +x /usr/local/bin/msedgedriver
              rm -f /tmp/msedgedriver.zip
            fi

            # geckodriver is not always present; install the version used by the devcontainer.
            if ! command -v geckodriver >/dev/null 2>&1; then
              GECKODRIVER_VERSION="v0.36.0"
              wget -O /tmp/geckodriver.tar.gz \
                "https://github.com/mozilla/geckodriver/releases/download/${GECKODRIVER_VERSION}/geckodriver-${GECKODRIVER_VERSION}-linux64.tar.gz"
              tar -xzf /tmp/geckodriver.tar.gz -C /tmp
              mv /tmp/geckodriver /usr/local/bin/geckodriver
              chmod +x /usr/local/bin/geckodriver
              rm -f /tmp/geckodriver.tar.gz
            fi

            # Ensure Java/Maven are available for Flyway migrations (via Maven plugin).
            if ! command -v mvn >/dev/null 2>&1; then
              apt-get install -y --no-install-recommends gnupg
              rm -f /usr/share/keyrings/adoptium.gpg
              curl -fsSL https://packages.adoptium.net/artifactory/api/gpg/key/public \
                | gpg --batch --yes --no-tty --dearmor -o /usr/share/keyrings/adoptium.gpg
              echo "deb [signed-by=/usr/share/keyrings/adoptium.gpg] https://packages.adoptium.net/artifactory/deb $(. /etc/os-release && echo $VERSION_CODENAME) main" \
                > /etc/apt/sources.list.d/adoptium.list
              apt-get update
              apt-get install -y --no-install-recommends temurin-21-jdk

              export JAVA_HOME="/usr/lib/jvm/temurin-21-jdk-$(dpkg --print-architecture)"
              export PATH="$JAVA_HOME/bin:$PATH"

              MAVEN_VERSION="3.9.12"
              curl -fsSL -o /tmp/maven.tar.gz \
                "https://archive.apache.org/dist/maven/maven-3/${MAVEN_VERSION}/binaries/apache-maven-${MAVEN_VERSION}-bin.tar.gz"
              curl -fsSL -o /tmp/maven.tar.gz.sha512 \
                "https://archive.apache.org/dist/maven/maven-3/${MAVEN_VERSION}/binaries/apache-maven-${MAVEN_VERSION}-bin.tar.gz.sha512"
              echo "$(cat /tmp/maven.tar.gz.sha512)  /tmp/maven.tar.gz" | sha512sum -c - \
                && tar -xzf /tmp/maven.tar.gz -C /opt \
                && ln -s /opt/apache-maven-${MAVEN_VERSION}/bin/mvn /usr/local/bin/mvn
              rm -f /tmp/maven.tar.gz /tmp/maven.tar.gz.sha512
            fi

            echo "Tooling setup complete."
          '

      - name: Inject prebuilt module directories into zms-web
        shell: bash
        run: |
          set -euo pipefail
          WEB_CONT="zms-web"
          PHP_TAG="${{ steps.tags.outputs.php_tag }}"
          modules=(zmsadmin zmsapi zmscalldisplay zmscitizenapi zmsmessaging zmsstatistic zmsticketprinter)
          layout_modules=(zmsadmin zmsstatistic)

          retry() {
            local max_attempts="$1"
            local delay_seconds="$2"
            shift 2
            local attempt=1
            until "$@"; do
              if (( attempt >= max_attempts )); then
                echo "All ${max_attempts} attempts failed."
                return 1
              fi
              echo "Attempt ${attempt} failed; retrying in ${delay_seconds}s..."
              sleep "$delay_seconds"
              attempt=$((attempt + 1))
            done
          }

          # zmsadmin/zmsstatistic use file:../zmslayout deps (symlinks in node_modules).
          # Prebuilt images only contain the module tree; zmslayout must be present at runtime.
          # web bind-mounts the repo to /var/www/html — avoid docker cp (flaky on GHA:
          # archive/tar: missed writing … / unexpected EOF). Fall back to tar streaming if needed.
          echo "Ensuring zmslayout is available at $WEB_CONT:/var/www/html/zmslayout"
          if ! docker exec -u root "$WEB_CONT" bash -lc 'test -d /var/www/html/zmslayout/js && test -d /var/www/html/zmslayout/scss'; then
            echo "zmslayout not on bind mount; streaming via tar"
            docker exec -u root "$WEB_CONT" bash -lc "mkdir -p /var/www/html/zmslayout"
            retry 3 10 env WEB_CONT="$WEB_CONT" bash -c 'tar cf - -C ./zmslayout . | docker exec -i -u root "$WEB_CONT" tar -xf - -C /var/www/html/zmslayout/'
          fi

          inject_module() {
            local m="$1"
            echo "Injecting $m from GHCR image tag $PHP_TAG into $WEB_CONT:/var/www/html/$m"
            docker exec -u root "$WEB_CONT" bash -lc "mkdir -p /var/www/html/${m}"

            if [[ " ${layout_modules[*]} " == *" ${m} "* ]]; then
              # docker cp to the runner resolves symlinks on the host (../../zmslayout/js does not exist there).
              # Materialize inside the module image, then stream tarball image -> zms-web.
              docker run --rm \
                -v "${GITHUB_WORKSPACE}/zmslayout:/var/www/zmslayout:ro" \
                "ghcr.io/${GITHUB_REPOSITORY}/${m}:${PHP_TAG}" \
                bash -lc 'set -euo pipefail
                  cd /var/www/html
                  for spec in bo-zms-layout-js:js bo-zms-layout-scss:scss; do
                    name="${spec%%:*}"
                    dir="${spec##*:}"
                    if [[ -L "node_modules/${name}" ]]; then
                      rm -f "node_modules/${name}"
                      cp -a "/var/www/zmslayout/${dir}" "node_modules/${name}"
                    fi
                  done
                  tar cf - -C /var/www/html .' \
                | docker exec -i -u root "$WEB_CONT" tar -xf - -C "/var/www/html/${m}/"
            else
              # `docker cp` to the runner fails when vendor contains path-repo symlinks
              # (e.g. vendor/eappointment/mellon -> ../../../mellon/) because those
              # targets are outside the module image. Stream tar image -> zms-web instead;
              # symlinks stay valid against the checked-out monorepo at /var/www/html.
              docker run --rm --entrypoint tar "ghcr.io/${GITHUB_REPOSITORY}/${m}:${PHP_TAG}" \
                -cf - -C /var/www/html . \
                | docker exec -i -u root "$WEB_CONT" tar -xf - -C "/var/www/html/${m}/"
            fi

            docker exec -u root "$WEB_CONT" bash -lc "chown -R www-data:www-data /var/www/html/${m} 2>/dev/null || true; chmod -R 755 /var/www/html/${m} 2>/dev/null || true"
          }

          for m in "${modules[@]}"; do
            retry 3 10 inject_module "$m"
          done

          docker exec -u root "$WEB_CONT" bash -lc "chown -R www-data:www-data /var/www/html/zmslayout 2>/dev/null || true; chmod -R 755 /var/www/html/zmslayout 2>/dev/null || true"

      - name: Ensure writable cache directories
        shell: bash
        run: |
          set -euo pipefail
          WEB_CONT="zms-web"
          docker exec -u root "$WEB_CONT" bash -lc '
            set -euo pipefail
            # Global cache dir required by CACHE_DIR=/var/www/html/cache in .env.template
            mkdir -p /var/www/html/cache
            chown -R www-data:www-data /var/www/html/cache 2>/dev/null || true
            chmod -R 777 /var/www/html/cache 2>/dev/null || true

            # Module cache dirs (local devcontainer does similar in postStartCommand)
            for dir in zmsadmin zmsapi zmscalldisplay zmscitizenapi zmsstatistic zmsticketprinter zmsmessaging; do
              mkdir -p "/var/www/html/$dir/cache"
              chown -R www-data:www-data "/var/www/html/$dir/cache" 2>/dev/null || true
              chmod -R 777 "/var/www/html/$dir/cache" 2>/dev/null || true
            done
          '

      - name: Run zmsautomation ATAF tests sequentially (by tag lines)
        shell: bash
        run: |
          set -euo pipefail

          WEB_CONT="zms-web"
          BROWSER="${{ matrix.browser }}"
          SCREENSHOT="${{ inputs.per_step_screenshots }}"

          if [[ "${{ github.event_name }}" == "schedule" || "${{ github.event_name == 'workflow_dispatch' && inputs.run_main_next_matrix }}" == "true" ]]; then
            TEST_LAYER="both"
            TAG_INPUT=""
          else
            TEST_LAYER="${{ inputs.test_layer }}"
            TAG_INPUT="${{ inputs.cucumber_tag_expressions }}"
          fi

          case "$TEST_LAYER" in
            api) PROFILES=(-Pataf-api) ;;
            ui) PROFILES=(-Pataf-ui) ;;
            both) PROFILES=(-Pataf-api -Pataf-ui) ;;
            *)
              echo "Unknown test layer: $TEST_LAYER"
              exit 1
              ;;
          esac

          # One empty line when no tag filter → run all tests in the selected layer(s).
          if [[ -z "$(printf '%s' "$TAG_INPUT" | tr -d '[:space:]')" ]]; then
            TAG_LINES=("")
          else
            TAG_LINES=()
            while IFS= read -r line; do
              line="$(printf '%s' "$line" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"
              [[ -n "$line" ]] && TAG_LINES+=("$line")
            done <<< "$TAG_INPUT"
            # If all lines were empty/whitespace, default to running all tests
            [[ ${#TAG_LINES[@]} -eq 0 ]] && TAG_LINES=("")
          fi

          fail_any=0
          for expr in "${TAG_LINES[@]}"; do
            expr="$(printf '%s' "$expr" | tr -d '\r' | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"

            if [[ -n "$expr" ]]; then
              echo "Running zmsautomation-test (${TEST_LAYER}) with tags: $expr"
            else
              echo "Running zmsautomation-test (${TEST_LAYER}), all tests"
            fi

            set +e
            docker exec -u root "$WEB_CONT" bash -lc '
              set -euo pipefail
              set -a
              source /var/www/html/.devcontainer/.env
              tags="$1"
              SCREENSHOT_EVERY_STEP="$2"
              ZMS_BROWSER="$3"
              shift 3
              WEBDRIVER_RETRY_MAX_ATTEMPTS="${WEBDRIVER_RETRY_MAX_ATTEMPTS:-4}"
              WEBDRIVER_RETRY_DELAY_SECONDS="${WEBDRIVER_RETRY_DELAY_SECONDS:-30}"

              args=("$@")
              if [[ -n "$tags" ]]; then
                args+=("-Dcucumber.filter.tags=$tags")
              fi

              bash /var/www/html/zmsautomation/zmsautomation-test "${args[@]}"
            ' -- "$expr" "$SCREENSHOT" "$BROWSER" "${PROFILES[@]}"
            rc=$?
            set -e

            if [ "$rc" -ne 0 ]; then
              if [[ -n "$expr" ]]; then
                echo "Run failed (exit $rc): layer=${TEST_LAYER}, tags=${expr}"
              else
                echo "Run failed (exit $rc): layer=${TEST_LAYER}, all tests"
              fi
              fail_any=1
            fi
          done

          if [ "$fail_any" -ne 0 ]; then
            echo "At least one test run failed."
            exit 1
          fi

      - name: Upload test reports (best effort)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: zmsautomation-ataf-reports-${{ github.run_id }}-${{ github.run_attempt }}-${{ steps.tags.outputs.branch_slug }}-${{ matrix.browser }}
          path: |
            zmsautomation/target/cucumber.json
            zmsautomation/target/site/cucumber-pretty/**
            zmsautomation/target/surefire-reports/**
            zmsautomation/target/screenshots/**
          if-no-files-found: warn

      - name: Collect docker container logs
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/container-logs

          # Always capture container overview for debugging.
          docker ps -a > artifacts/container-logs/docker-ps-a.txt 2>&1 || true

          containers=(
            zms-web
            zms-citizenview
            zms-db
            zms-keycloak
            zms-refarch-gateway
            zms-init-keycloak
          )

          for c in "${containers[@]}"; do
            if docker inspect "$c" >/dev/null 2>&1; then
              docker logs "$c" > "artifacts/container-logs/${c}.log" 2>&1 || true
              docker inspect "$c" > "artifacts/container-logs/${c}.inspect.json" 2>/dev/null || true
            fi
          done

      - name: Upload container logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: zmsautomation-container-logs-${{ github.run_id }}-${{ github.run_attempt }}-${{ steps.tags.outputs.branch_slug }}-${{ matrix.browser }}
          path: artifacts/container-logs/**
          if-no-files-found: warn
