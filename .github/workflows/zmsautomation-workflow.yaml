name: ⚙️ zmsautomation
run-name: >-
  ${{
    github.event_name == 'schedule' && 'zmsautomation | ⏰ scheduled | 5 modules × main + next | 🌐 chrome'
    || (github.event_name == 'workflow_dispatch' && inputs.run_main_next_matrix
        && 'zmsautomation | ▶️ manual | full shard matrix | main + next | 🌐 chrome')
    || format(
         'zmsautomation | ▶️ manual | {0} | {1} | {2} | {3}',
         inputs.branch,
         inputs.module,
         inputs.browser == 'firefox' && '🦊 firefox' || (inputs.browser == 'edge' && '🪟 edge' || '🌐 chrome'),
         inputs.module == 'custom' && inputs.cucumber_tag_expressions || ''
       )
  }}

on:
  workflow_dispatch:
    inputs:
      run_main_next_matrix:
        description: |
          Run the full scheduled shard matrix: main + next, chrome, all 5 modules
          (admin, citizenview, statistic, zmsapi, zmscitizenapi). Ignores inputs below.
        required: true
        type: boolean
        default: false
      branch:
        description: Git branch to test (single-job manual runs only)
        required: true
        type: choice
        options:
          - main
          - next
        default: main
      module:
        description: |
          Test module (single-job manual runs only). Use "custom" with test layer and tag
          fields below for ad-hoc filters (e.g. @ZMSKVR-1328).
        required: true
        type: choice
        options:
          - all
          - admin
          - citizenview
          - statistic
          - zmsapi
          - zmscitizenapi
          - custom
        default: all
      test_layer:
        description: |
          Only when module = custom. API = REST, UI = Selenium, both = full suite in one job.
        required: true
        type: choice
        options:
          - both
          - api
          - ui
        default: both
      cucumber_tag_expressions:
        description: |
          Only when module = custom. Newline-separated Cucumber tag expressions; each line
          runs sequentially. @ignore is excluded automatically.
          Examples: @ZMSKVR-1328, @smoke
        required: false
        default: ""
      browser:
        description: Browser for UI tests (ignored for API-only modules zmsapi / zmscitizenapi)
        required: true
        type: choice
        options:
          - chrome
          - firefox
          - edge
        default: chrome
      per_step_screenshots:
        description: Enable/disable per-step screenshots
        required: true
        type: boolean
        default: true
  schedule:
    # GitHub Actions cron uses UTC. 01:00 UTC ≈ 03:00 Europe/Berlin (CEST) / 02:00 (CET).
    - cron: "0 1 * * *"

permissions:
  contents: read
  packages: read

jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      max_parallel: ${{ steps.set-matrix.outputs.max_parallel }}
    steps:
      - name: Build job matrix
        id: set-matrix
        shell: bash
        run: |
          set -euo pipefail

          append_not_ignore() {
            local expr="$1"
            if [[ -z "$expr" ]]; then
              printf '%s' "not @ignore"
            else
              printf '%s' "(${expr}) and not @ignore"
            fi
          }

          FULL_MATRIX=false
          if [[ "${{ github.event_name }}" == "schedule" ]] || [[ "${{ inputs.run_main_next_matrix }}" == "true" ]]; then
            FULL_MATRIX=true
          fi

          if [[ "$FULL_MATRIX" == true ]]; then
            jq -n \
              --arg admin "$(append_not_ignore '@zmsadmin')" \
              --arg citizenview "$(append_not_ignore '@zmscitizenview')" \
              --arg statistic "$(append_not_ignore '@zmsstatistic')" \
              --arg zmsapi "$(append_not_ignore '@zmsapi')" \
              --arg zmscitizenapi "$(append_not_ignore '@zmscitizenapi')" \
              '
              {
                include: [
                  ["main", "next"][] as $branch
                  | [
                      {shard: "admin", test_layer: "ui", tag_filter: $admin},
                      {shard: "citizenview", test_layer: "ui", tag_filter: $citizenview},
                      {shard: "statistic", test_layer: "ui", tag_filter: $statistic},
                      {shard: "zmsapi", test_layer: "api", tag_filter: $zmsapi},
                      {shard: "zmscitizenapi", test_layer: "api", tag_filter: $zmscitizenapi}
                    ][] as $shard
                  | $shard + {branch: $branch, browser: "chrome", use_custom_tags: false}
                ]
              }
              ' > matrix.json
            echo "max_parallel=10" >> "$GITHUB_OUTPUT"
          else
            BRANCH="${{ inputs.branch }}"
            BROWSER="${{ inputs.browser }}"
            MODULE="${{ inputs.module }}"
            TEST_LAYER="${{ inputs.test_layer }}"

            case "$MODULE" in
              all)
                TAG_FILTER="$(append_not_ignore '')"
                TEST_LAYER="both"
                SHARD="all"
                USE_CUSTOM=false
                ;;
              admin)
                TAG_FILTER="$(append_not_ignore '@zmsadmin')"
                TEST_LAYER="ui"
                SHARD="admin"
                USE_CUSTOM=false
                ;;
              citizenview)
                TAG_FILTER="$(append_not_ignore '@zmscitizenview')"
                TEST_LAYER="ui"
                SHARD="citizenview"
                USE_CUSTOM=false
                ;;
              statistic)
                TAG_FILTER="$(append_not_ignore '@zmsstatistic')"
                TEST_LAYER="ui"
                SHARD="statistic"
                USE_CUSTOM=false
                ;;
              zmsapi)
                TAG_FILTER="$(append_not_ignore '@zmsapi')"
                TEST_LAYER="api"
                SHARD="zmsapi"
                USE_CUSTOM=false
                ;;
              zmscitizenapi)
                TAG_FILTER="$(append_not_ignore '@zmscitizenapi')"
                TEST_LAYER="api"
                SHARD="zmscitizenapi"
                USE_CUSTOM=false
                ;;
              custom)
                TAG_FILTER=""
                SHARD="custom"
                USE_CUSTOM=true
                ;;
              *)
                echo "Unknown module: $MODULE"
                exit 1
                ;;
            esac

            jq -n \
              --arg branch "$BRANCH" \
              --arg browser "$BROWSER" \
              --arg shard "$SHARD" \
              --arg test_layer "$TEST_LAYER" \
              --arg tag_filter "$TAG_FILTER" \
              --argjson use_custom_tags "$USE_CUSTOM" \
              '{include: [{branch: $branch, browser: $browser, shard: $shard, test_layer: $test_layer, tag_filter: $tag_filter, use_custom_tags: $use_custom_tags}]}' \
              > matrix.json
            echo "max_parallel=1" >> "$GITHUB_OUTPUT"
          fi

          echo "matrix=$(jq -c . matrix.json)" >> "$GITHUB_OUTPUT"
          echo "Generated matrix:"
          jq . matrix.json

  zms-automation:
    needs: generate-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: ${{ fromJson(needs.generate-matrix.outputs.max_parallel) }}
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
    env:
      IMAGE_REGISTRY: ghcr.io
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: ${{ matrix.branch }}
          persist-credentials: false

      - name: Create runtime env file
        run: cp .devcontainer/.env.template .devcontainer/.env

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        shell: bash
        run: |
          set -euo pipefail
          REF_TYPE="branch"
          REF_NAME="${{ matrix.branch }}"

          SANITIZED="$(echo "$REF_NAME" | sed 's/[\/:]/-/g')"
          PHP_TAG="branch-${SANITIZED}"
          BRANCH_SLUG="$SANITIZED"

          echo "branch_name=$REF_NAME" >> "$GITHUB_OUTPUT"
          echo "branch_slug=$BRANCH_SLUG" >> "$GITHUB_OUTPUT"
          echo "php_tag=$PHP_TAG" >> "$GITHUB_OUTPUT"

      - name: Pull prebuilt PHP module images
        shell: bash
        run: |
          set -euo pipefail
          PHP_TAG="${{ steps.tags.outputs.php_tag }}"
          modules=(zmsadmin zmsapi zmscalldisplay zmscitizenapi zmsmessaging zmsstatistic zmsticketprinter)
          for m in "${modules[@]}"; do
            echo "Pulling $m:$PHP_TAG"
            docker pull "ghcr.io/${GITHUB_REPOSITORY}/${m}:$PHP_TAG"
          done

      - name: Start required containers (stack once)
        shell: bash
        run: |
          set -euo pipefail

          cd .devcontainer

          docker compose -f docker-compose.yaml down -v --remove-orphans || true
          docker compose -f docker-compose.yaml up -d \
            web db citizenview refarch-gateway keycloak init-keycloak

          for _ in {1..60}; do
            state="$(docker inspect -f '{{.State.Status}}' zms-init-keycloak 2>/dev/null || echo missing)"
            if [ "$state" = "exited" ]; then
              echo "init-keycloak finished."
              docker logs zms-init-keycloak || true
              break
            fi
            sleep 2
          done

      - name: Install missing tooling inside web container
        shell: bash
        run: |
          set -euo pipefail
          WEB_CONT="zms-web"
          TARGET_BROWSER="${{ matrix.browser }}"

          docker exec -u root -e TARGET_BROWSER="$TARGET_BROWSER" "$WEB_CONT" bash -lc '
            set -euo pipefail
            apt-get update

            CHROMIUM_APT_VERSION="150.0.7871.100-1~deb13u1"
            if ! apt-cache show "chromium=${CHROMIUM_APT_VERSION}" >/dev/null 2>&1; then
              CHROMIUM_APT_VERSION="$(apt-cache policy chromium 2>/dev/null | grep "^  Candidate:" | head -1 | sed "s/^  Candidate: //" | tr -d " ")"
              echo "Pinned Chromium unavailable; using mirror candidate ${CHROMIUM_APT_VERSION}"
            fi
            apt-get install -y --no-install-recommends --allow-downgrades \
              curl wget unzip ca-certificates gnupg \
              mariadb-client \
              x11-utils x11-xserver-utils \
              xvfb \
              firefox-esr \
              "chromium-common=${CHROMIUM_APT_VERSION}" \
              "chromium=${CHROMIUM_APT_VERSION}" \
              "chromium-driver=${CHROMIUM_APT_VERSION}" \
              ;
            dpkg-query -W -f="chromium=%Version\n" chromium chromium-driver
            chromedriver --version

            ln -sf /usr/bin/firefox-esr /usr/bin/firefox || true

            if [[ "${TARGET_BROWSER:-}" == "edge" ]]; then
              mkdir -p /etc/apt/keyrings
              rm -f /etc/apt/keyrings/microsoft.gpg
              curl -fsSL https://packages.microsoft.com/keys/microsoft.asc \
                | gpg --batch --yes --no-tty --dearmor -o /etc/apt/keyrings/microsoft.gpg
              echo "deb [arch=amd64 signed-by=/etc/apt/keyrings/microsoft.gpg] https://packages.microsoft.com/repos/edge stable main" \
                > /etc/apt/sources.list.d/microsoft-edge.list
              apt-get update
              apt-get install -y --no-install-recommends microsoft-edge-stable

              EDGE_VERSION="$(microsoft-edge --version | awk "{print \$3}")"
              EDGE_VERSION="${EDGE_VERSION%%-*}"
              curl -fsSL -o /tmp/msedgedriver.zip \
                "https://msedgedriver.microsoft.com/${EDGE_VERSION}/edgedriver_linux64.zip"
              unzip -o /tmp/msedgedriver.zip -d /tmp
              mv /tmp/msedgedriver /usr/local/bin/msedgedriver
              chmod +x /usr/local/bin/msedgedriver
              rm -f /tmp/msedgedriver.zip
            fi

            if ! command -v geckodriver >/dev/null 2>&1; then
              GECKODRIVER_VERSION="v0.36.0"
              wget -O /tmp/geckodriver.tar.gz \
                "https://github.com/mozilla/geckodriver/releases/download/${GECKODRIVER_VERSION}/geckodriver-${GECKODRIVER_VERSION}-linux64.tar.gz"
              tar -xzf /tmp/geckodriver.tar.gz -C /tmp
              mv /tmp/geckodriver /usr/local/bin/geckodriver
              chmod +x /usr/local/bin/geckodriver
              rm -f /tmp/geckodriver.tar.gz
            fi

            if ! command -v mvn >/dev/null 2>&1; then
              apt-get install -y --no-install-recommends gnupg
              rm -f /usr/share/keyrings/adoptium.gpg
              curl -fsSL https://packages.adoptium.net/artifactory/api/gpg/key/public \
                | gpg --batch --yes --no-tty --dearmor -o /usr/share/keyrings/adoptium.gpg
              echo "deb [signed-by=/usr/share/keyrings/adoptium.gpg] https://packages.adoptium.net/artifactory/deb $(. /etc/os-release && echo $VERSION_CODENAME) main" \
                > /etc/apt/sources.list.d/adoptium.list
              apt-get update
              apt-get install -y --no-install-recommends temurin-21-jdk

              export JAVA_HOME="/usr/lib/jvm/temurin-21-jdk-$(dpkg --print-architecture)"
              export PATH="$JAVA_HOME/bin:$PATH"

              MAVEN_VERSION="3.9.12"
              curl -fsSL -o /tmp/maven.tar.gz \
                "https://archive.apache.org/dist/maven/maven-3/${MAVEN_VERSION}/binaries/apache-maven-${MAVEN_VERSION}-bin.tar.gz"
              curl -fsSL -o /tmp/maven.tar.gz.sha512 \
                "https://archive.apache.org/dist/maven/maven-3/${MAVEN_VERSION}/binaries/apache-maven-${MAVEN_VERSION}-bin.tar.gz.sha512"
              echo "$(cat /tmp/maven.tar.gz.sha512)  /tmp/maven.tar.gz" | sha512sum -c - \
                && tar -xzf /tmp/maven.tar.gz -C /opt \
                && ln -s /opt/apache-maven-${MAVEN_VERSION}/bin/mvn /usr/local/bin/mvn
              rm -f /tmp/maven.tar.gz /tmp/maven.tar.gz.sha512
            fi

            echo "Tooling setup complete."
          '

      - name: Inject prebuilt module directories into zms-web
        shell: bash
        run: |
          set -euo pipefail
          WEB_CONT="zms-web"
          PHP_TAG="${{ steps.tags.outputs.php_tag }}"
          modules=(zmsadmin zmsapi zmscalldisplay zmscitizenapi zmsmessaging zmsstatistic zmsticketprinter)
          layout_modules=(zmsadmin zmsstatistic)

          retry() {
            local max_attempts="$1"
            local delay_seconds="$2"
            shift 2
            local attempt=1
            until "$@"; do
              if (( attempt >= max_attempts )); then
                echo "All ${max_attempts} attempts failed."
                return 1
              fi
              echo "Attempt ${attempt} failed; retrying in ${delay_seconds}s..."
              sleep "$delay_seconds"
              attempt=$((attempt + 1))
            done
          }

          echo "Ensuring zmslayout is available at $WEB_CONT:/var/www/html/zmslayout"
          if ! docker exec -u root "$WEB_CONT" bash -lc 'test -d /var/www/html/zmslayout/js && test -d /var/www/html/zmslayout/scss'; then
            echo "zmslayout not on bind mount; streaming via tar"
            docker exec -u root "$WEB_CONT" bash -lc "mkdir -p /var/www/html/zmslayout"
            retry 3 10 env WEB_CONT="$WEB_CONT" bash -c 'tar cf - -C ./zmslayout . | docker exec -i -u root "$WEB_CONT" tar -xf - -C /var/www/html/zmslayout/'
          fi

          inject_module() {
            local m="$1"
            echo "Injecting $m from GHCR image tag $PHP_TAG into $WEB_CONT:/var/www/html/$m"
            docker exec -u root "$WEB_CONT" bash -lc "mkdir -p /var/www/html/${m}"

            if [[ " ${layout_modules[*]} " == *" ${m} "* ]]; then
              docker run --rm \
                -v "${GITHUB_WORKSPACE}/zmslayout:/var/www/zmslayout:ro" \
                "ghcr.io/${GITHUB_REPOSITORY}/${m}:${PHP_TAG}" \
                bash -lc 'set -euo pipefail
                  cd /var/www/html
                  for spec in bo-zms-layout-js:js bo-zms-layout-scss:scss; do
                    name="${spec%%:*}"
                    dir="${spec##*:}"
                    if [[ -L "node_modules/${name}" ]]; then
                      rm -f "node_modules/${name}"
                      cp -a "/var/www/zmslayout/${dir}" "node_modules/${name}"
                    fi
                  done
                  tar cf - -C /var/www/html .' \
                | docker exec -i -u root "$WEB_CONT" tar -xf - -C "/var/www/html/${m}/"
            else
              docker run --rm --entrypoint tar "ghcr.io/${GITHUB_REPOSITORY}/${m}:${PHP_TAG}" \
                -cf - -C /var/www/html . \
                | docker exec -i -u root "$WEB_CONT" tar -xf - -C "/var/www/html/${m}/"
            fi

            docker exec -u root "$WEB_CONT" bash -lc "chown -R www-data:www-data /var/www/html/${m} 2>/dev/null || true; chmod -R 755 /var/www/html/${m} 2>/dev/null || true"
          }

          for m in "${modules[@]}"; do
            retry 3 10 inject_module "$m"
          done

          docker exec -u root "$WEB_CONT" bash -lc "chown -R www-data:www-data /var/www/html/zmslayout 2>/dev/null || true; chmod -R 755 /var/www/html/zmslayout 2>/dev/null || true"

      - name: Ensure writable cache directories
        shell: bash
        run: |
          set -euo pipefail
          WEB_CONT="zms-web"
          docker exec -u root "$WEB_CONT" bash -lc '
            set -euo pipefail
            mkdir -p /var/www/html/cache
            chown -R www-data:www-data /var/www/html/cache 2>/dev/null || true
            chmod -R 777 /var/www/html/cache 2>/dev/null || true

            for dir in zmsadmin zmsapi zmscalldisplay zmscitizenapi zmsstatistic zmsticketprinter zmsmessaging; do
              mkdir -p "/var/www/html/$dir/cache"
              chown -R www-data:www-data "/var/www/html/$dir/cache" 2>/dev/null || true
              chmod -R 777 "/var/www/html/$dir/cache" 2>/dev/null || true
            done
          '

      - name: Run zmsautomation ATAF tests
        shell: bash
        env:
          MATRIX_SHARD: ${{ matrix.shard }}
          MATRIX_TEST_LAYER: ${{ matrix.test_layer }}
          MATRIX_TAG_FILTER: ${{ matrix.tag_filter }}
          MATRIX_USE_CUSTOM_TAGS: ${{ matrix.use_custom_tags }}
          CUSTOM_TAG_INPUT: ${{ inputs.cucumber_tag_expressions }}
          SCREENSHOT: ${{ github.event_name == 'workflow_dispatch' && inputs.per_step_screenshots || 'false' }}
        run: |
          set -euo pipefail

          WEB_CONT="zms-web"
          BROWSER="${{ matrix.browser }}"
          TEST_LAYER="$MATRIX_TEST_LAYER"

          case "$TEST_LAYER" in
            api) PROFILES=(-Pataf-api) ;;
            ui) PROFILES=(-Pataf-ui) ;;
            both) PROFILES=(-Pataf-api -Pataf-ui) ;;
            *)
              echo "Unknown test layer: $TEST_LAYER"
              exit 1
              ;;
          esac

          append_not_ignore() {
            local expr="$1"
            if [[ -z "$expr" ]]; then
              printf '%s' "not @ignore"
            else
              printf '%s' "(${expr}) and not @ignore"
            fi
          }

          TAG_LINES=()
          if [[ "$MATRIX_USE_CUSTOM_TAGS" == "true" ]]; then
            if [[ -z "$(printf '%s' "$CUSTOM_TAG_INPUT" | tr -d '[:space:]')" ]]; then
              TAG_LINES=("")
            else
              while IFS= read -r line; do
                line="$(printf '%s' "$line" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"
                [[ -n "$line" ]] && TAG_LINES+=("$line")
              done <<< "$CUSTOM_TAG_INPUT"
              [[ ${#TAG_LINES[@]} -eq 0 ]] && TAG_LINES=("")
            fi
          else
            TAG_LINES=("$MATRIX_TAG_FILTER")
          fi

          fail_any=0
          for expr in "${TAG_LINES[@]}"; do
            expr="$(printf '%s' "$expr" | tr -d '\r' | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"

            if [[ "$MATRIX_USE_CUSTOM_TAGS" == "true" ]]; then
              if [[ -n "$expr" ]]; then
                if [[ "$expr" == *"@ignore"* ]]; then
                  final_expr="$expr"
                else
                  final_expr="$(append_not_ignore "$expr")"
                fi
              else
                final_expr="not @ignore"
              fi
            else
              final_expr="$expr"
            fi

            if [[ -n "$final_expr" ]]; then
              echo "Running zmsautomation-test shard=${MATRIX_SHARD} layer=${TEST_LAYER} tags: ${final_expr}"
            else
              echo "Running zmsautomation-test shard=${MATRIX_SHARD} layer=${TEST_LAYER}, all tests (not @ignore)"
              final_expr="not @ignore"
            fi

            set +e
            docker exec -u root "$WEB_CONT" bash -lc '
              set -euo pipefail
              set -a
              source /var/www/html/.devcontainer/.env
              tags="$1"
              SCREENSHOT_EVERY_STEP="$2"
              ZMS_BROWSER="$3"
              shift 3

              args=("$@")
              if [[ -n "$tags" ]]; then
                args+=("-Dcucumber.filter.tags=$tags")
              fi

              bash /var/www/html/zmsautomation/zmsautomation-test "${args[@]}"
            ' -- "$final_expr" "$SCREENSHOT" "$BROWSER" "${PROFILES[@]}"
            rc=$?
            set -e

            if [ "$rc" -ne 0 ]; then
              echo "Run failed (exit $rc): shard=${MATRIX_SHARD}, layer=${TEST_LAYER}, tags=${final_expr}"
              fail_any=1
            fi
          done

          if [ "$fail_any" -ne 0 ]; then
            echo "At least one test run failed."
            exit 1
          fi

      - name: Upload test reports (best effort)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: zmsautomation-ataf-reports-${{ github.run_id }}-${{ github.run_attempt }}-${{ steps.tags.outputs.branch_slug }}-${{ matrix.shard }}-${{ matrix.browser }}
          path: |
            zmsautomation/target/cucumber.json
            zmsautomation/target/site/cucumber-pretty/**
            zmsautomation/target/surefire-reports/**
            zmsautomation/target/screenshots/**
          if-no-files-found: warn

      - name: Collect docker container logs
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/container-logs

          docker ps -a > artifacts/container-logs/docker-ps-a.txt 2>&1 || true

          containers=(
            zms-web
            zms-citizenview
            zms-db
            zms-keycloak
            zms-refarch-gateway
            zms-init-keycloak
          )

          for c in "${containers[@]}"; do
            if docker inspect "$c" >/dev/null 2>&1; then
              docker logs "$c" > "artifacts/container-logs/${c}.log" 2>&1 || true
              docker inspect "$c" > "artifacts/container-logs/${c}.inspect.json" 2>/dev/null || true
            fi
          done

      - name: Upload container logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: zmsautomation-container-logs-${{ github.run_id }}-${{ github.run_attempt }}-${{ steps.tags.outputs.branch_slug }}-${{ matrix.shard }}-${{ matrix.browser }}
          path: artifacts/container-logs/**
          if-no-files-found: warn
