# Local stand-in for ghcr.io/it-at-m/refarch/refarch-gateway.
# The official image is linux/amd64 and (since 1.8.x) requires x86-64-v3, which
# fails under Docker Desktop on Apple Silicon. Routes mirror local-gateway-application.yml.
#
# Important: do not put capture variables in proxy_pass URLs — that forces runtime
# DNS and yields 502 without an explicit resolver. Use rewrite + bare proxy_pass.
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    access_log /var/log/nginx/access.log;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 32m;

    map $http_origin $cors_origin {
        default "";
        "~^https?://localhost(:[0-9]+)?$" $http_origin;
        "~^https?://127\.0\.0\.1(:[0-9]+)?$" $http_origin;
        "~^https?://.*\.ddev\.site(:[0-9]+)?$" $http_origin;
        "~^https?://citizenview(:[0-9]+)?$" $http_origin;
        "~^https?://ddev-zms-web(:[0-9]+)?$" $http_origin;
        "~^https?://refarch-gateway(:[0-9]+)?$" $http_origin;
    }

    # OPTIONS preflight without if-in-location
    map $request_method $cors_preflight {
        default 0;
        OPTIONS 1;
    }

    server {
        listen 8080;
        server_name _;

        # Citizen API (public)
        location ~ ^/buergeransicht/api/citizen/(.*)$ {
            if ($cors_preflight) {
                add_header Access-Control-Allow-Origin $cors_origin always;
                add_header Access-Control-Allow-Methods "*" always;
                add_header Access-Control-Allow-Headers "*" always;
                add_header Access-Control-Max-Age 86400 always;
                add_header Content-Length 0;
                add_header Content-Type text/plain;
                return 204;
            }

            rewrite ^/buergeransicht/api/citizen/(.*)$ /terminvereinbarung/api/citizen/$1 break;
            proxy_pass http://web:80;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_hide_header WWW-Authenticate;
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods "*" always;
            add_header Access-Control-Allow-Headers "*" always;
        }

        # Citizen API (authenticated path prefix)
        location ~ ^/buergeransicht/authenticated/api/citizen/(.*)$ {
            if ($cors_preflight) {
                add_header Access-Control-Allow-Origin $cors_origin always;
                add_header Access-Control-Allow-Methods "*" always;
                add_header Access-Control-Allow-Headers "*" always;
                add_header Access-Control-Max-Age 86400 always;
                add_header Content-Length 0;
                add_header Content-Type text/plain;
                return 204;
            }

            rewrite ^/buergeransicht/authenticated/api/citizen/(.*)$ /terminvereinbarung/api/citizen/$1 break;
            proxy_pass http://web:80;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_hide_header WWW-Authenticate;
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods "*" always;
            add_header Access-Control-Allow-Headers "*" always;
        }

        # Webcomponent catch-all -> citizenview Vite
        location ~ ^/buergeransicht/(.*)$ {
            if ($cors_preflight) {
                add_header Access-Control-Allow-Origin $cors_origin always;
                add_header Access-Control-Allow-Methods "*" always;
                add_header Access-Control-Allow-Headers "*" always;
                add_header Access-Control-Max-Age 86400 always;
                add_header Content-Length 0;
                add_header Content-Type text/plain;
                return 204;
            }

            rewrite ^/buergeransicht/(.*)$ /$1 break;
            proxy_pass http://citizenview:8082;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_hide_header WWW-Authenticate;
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods "*" always;
            add_header Access-Control-Allow-Headers "*" always;
        }

        location = /healthz {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "ok\n";
        }
    }
}
