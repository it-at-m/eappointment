# Verbose gateway logs: ddev logs -s refarch-gateway
# (or: docker logs -f ddev-<project>-refarch-gateway)
# CORS is enforced in the browser; gateway still logs each request (incl. OPTIONS).
logging:
  level:
    root: INFO
    org.springframework.cloud.gateway: DEBUG
    org.springframework.cloud.gateway.handler: DEBUG
    org.springframework.cloud.gateway.filter: DEBUG
    org.springframework.web.cors: DEBUG
    org.springframework.web.cors.reactive: DEBUG
    org.springframework.web.server.adapter: DEBUG
    reactor.netty.http.server: DEBUG

spring:
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns:
              - "https://*.ddev.site"
              - "http://localhost:*"
              - "https://localhost:*"
              - "http://citizenview:*"
              - "https://citizenview:*"
              - "http://ddev-zms-web:*"
              - "https://ddev-zms-web:*"
              - "http://refarch-gateway:*"
              - "https://refarch-gateway:*"
            allowedMethods:
              - '*'
            allowedHeaders:
              - '*'
      routes:
        - id: "citizen-api"
          uri: "http://ddev-zms-web:80"
          predicates:
            - Path=/buergeransicht/api/citizen/**
          filters:
            - PreserveHostHeader
            - RewritePath=/buergeransicht/api/citizen/(?<segment>.*), /terminvereinbarung/api/citizen/${segment}
            - RemoveResponseHeader=WWW-Authenticate
        - id: "citizen-api-authenticated"
          uri: "http://ddev-zms-web:80"
          predicates:
            - Path=/buergeransicht/authenticated/api/citizen/**
          filters:
            - PreserveHostHeader
            - RewritePath=/buergeransicht/authenticated/api/citizen/(?<segment>.*), /terminvereinbarung/api/citizen/${segment}
            - RemoveResponseHeader=WWW-Authenticate
        - id: "webcomponent"
          uri: "${WEBCOMPONENT_URI}"
          predicates:
            - Path=/buergeransicht/**
          filters:
           filters:
             - RewritePath=/buergeransicht/(?<segment>.*), /${segment}
             - RemoveResponseHeader=WWW-Authenticate
            - RewritePath=/buergeransicht/(?<segment>.*), /${segment}
            - RemoveResponseHeader=WWW-Authenticate
