<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <link href="/favicon.ico" rel="icon">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Terminvereinbarung Bürgeransicht Webcomponent</title>

    <!-- Muenchen.de-Styles -->
    <link
            rel="stylesheet"
            href="https://assets.muenchen.de/mde/1.1.15/css/fonts.css"
    />
    <link
            rel="stylesheet"
            href="https://assets.muenchen.de/mde/1.1.15/css/style.css"
    />

    <!-- login: local Keycloak shim or CDN dbs-login (see local-dev/bootstrap-login.ts) -->
    <script type="module" src="/src/local-dev/bootstrap-login.ts"></script>

    <!-- built files will be auto injected -->
    <script src="src/zms-appointment-slider-webcomponent.ts" type="module"></script>

</head>
<body>

<noscript>
    <strong>Damit das Widget korrekt funktioniert, muss Javascript aktiviert werden.</strong>
</noscript>

<dbs-login
        kc-url="%VITE_KC_URL%"
        kc-realm="%VITE_KC_REALM%"
        kc-client-id="%VITE_KC_CLIENT_ID%"
></dbs-login>

<h1>zms-appointment-slider overview page</h1>
<zms-appointment-slider-i18n-host>
    <zms-appointment-slider-wrapped
        appointment-detail-url="appointment-detail.html"
        appointment-overview-url="appointment-overview.html"
        new-appointment-url="appointment-view.html"
        displayed-on-detail-screen="false"
    ></zms-appointment-slider-wrapped>
</zms-appointment-slider-i18n-host>

<h1>zms-appointment-slider detail page</h1>
<zms-appointment-slider-i18n-host>
    <zms-appointment-slider-wrapped
            appointment-detail-url="appointment-detail.html"
            appointment-overview-url="appointment-overview.html"
            new-appointment-url="appointment-view.html"
            displayed-on-detail-screen="true"
    ></zms-appointment-slider-wrapped>
</zms-appointment-slider-i18n-host>
</body>

</html>
